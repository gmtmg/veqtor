<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#10101e"/>
    </linearGradient>
    <linearGradient id="loop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="760" height="400" rx="12" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="80" x2="760" y2="80"/><line x1="0" y1="160" x2="760" y2="160"/>
    <line x1="0" y1="240" x2="760" y2="240"/><line x1="0" y1="320" x2="760" y2="320"/>
    <line x1="190" y1="0" x2="190" y2="400"/><line x1="380" y1="0" x2="380" y2="400"/>
    <line x1="570" y1="0" x2="570" y2="400"/>
  </g>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#a0a0b0" opacity="0.8" letter-spacing="0.1em">HARNESS ARCHITECTURE: 3 PILLARS</text>

  <!-- Pillar labels -->
  <text x="155" y="64" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#00d4ff" opacity="0.7">PILLAR 1</text>
  <text x="380" y="64" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#f59e0b" opacity="0.7">PILLAR 2</text>
  <text x="605" y="64" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#7c3aed" opacity="0.7">PILLAR 3</text>

  <!-- ===== Pillar 1: Context Design ===== -->
  <g transform="translate(155,160)">
    <rect x="-85" y="-70" width="170" height="140" rx="10" fill="#141425" stroke="#00d4ff" stroke-width="1.5"/>
    <!-- Document stack icon -->
    <g transform="translate(0,-34)">
      <rect x="-12" y="-8" width="24" height="16" rx="2" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
      <line x1="-8" y1="-3" x2="8" y2="-3" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
      <line x1="-8" y1="1" x2="8" y2="1" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
      <line x1="-8" y1="5" x2="4" y2="5" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    </g>
    <text x="0" y="-4" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#00d4ff" opacity="0.9">Context Design</text>
    <text x="0" y="12" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a0a0b0" opacity="0.7">コンテキスト設計</text>
    <!-- Sub items -->
    <text x="0" y="34" text-anchor="middle" font-family="monospace" font-size="9" fill="#00d4ff" opacity="0.5">AGENTS.md</text>
    <text x="0" y="48" text-anchor="middle" font-family="monospace" font-size="9" fill="#00d4ff" opacity="0.5">CLAUDE.md</text>
    <text x="0" y="62" text-anchor="middle" font-family="monospace" font-size="9" fill="#00d4ff" opacity="0.5">docs/</text>
  </g>

  <!-- ===== Pillar 2: Architecture Constraints ===== -->
  <g transform="translate(380,160)">
    <rect x="-85" y="-70" width="170" height="140" rx="10" fill="#141425" stroke="#f59e0b" stroke-width="1.5"/>
    <!-- Shield/gate icon -->
    <g transform="translate(0,-34)">
      <path d="M-10,-8 L0,-12 L10,-8 L10,4 Q0,12 -10,4 Z" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
      <line x1="0" y1="-6" x2="0" y2="4" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    </g>
    <text x="0" y="-4" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#f59e0b" opacity="0.9">Arch Constraints</text>
    <text x="0" y="12" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a0a0b0" opacity="0.7">アーキテクチャ制約</text>
    <!-- Sub items -->
    <text x="0" y="34" text-anchor="middle" font-family="monospace" font-size="9" fill="#f59e0b" opacity="0.5">Linter / Formatter</text>
    <text x="0" y="48" text-anchor="middle" font-family="monospace" font-size="9" fill="#f59e0b" opacity="0.5">CI / Pre-commit</text>
    <text x="0" y="62" text-anchor="middle" font-family="monospace" font-size="9" fill="#f59e0b" opacity="0.5">Blueprint</text>
  </g>

  <!-- ===== Pillar 3: Entropy Management ===== -->
  <g transform="translate(605,160)">
    <rect x="-85" y="-70" width="170" height="140" rx="10" fill="#141425" stroke="#7c3aed" stroke-width="1.5"/>
    <!-- Cycle/refresh icon -->
    <g transform="translate(0,-34)">
      <path d="M-8,-6 A10,10 0 1,1 -8,6" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
      <polygon points="-12,6 -8,12 -4,6" fill="#7c3aed" opacity="0.7"/>
      <path d="M8,6 A10,10 0 1,1 8,-6" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
      <polygon points="4,-6 8,-12 12,-6" fill="#7c3aed" opacity="0.7"/>
    </g>
    <text x="0" y="-4" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#7c3aed" opacity="0.9">Entropy Mgmt</text>
    <text x="0" y="12" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a0a0b0" opacity="0.7">エントロピー管理</text>
    <!-- Sub items -->
    <text x="0" y="34" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed" opacity="0.5">Auto Audit</text>
    <text x="0" y="48" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed" opacity="0.5">Cleanup Tasks</text>
    <text x="0" y="62" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed" opacity="0.5">Drift Detection</text>
  </g>

  <!-- Feedback loop arrows connecting all 3 at the bottom -->
  <g transform="translate(0,310)">
    <!-- Connecting line -->
    <path d="M155,0 Q270,40 380,0 Q490,40 605,0" fill="none" stroke="url(#loop)" stroke-width="2" opacity="0.4"/>
    <!-- Arrow heads -->
    <polygon points="240,16 248,10 248,20" fill="#00d4ff" opacity="0.4"/>
    <polygon points="520,16 512,10 512,20" fill="#7c3aed" opacity="0.4"/>
    <!-- Center label -->
    <rect x="290" y="30" width="180" height="24" rx="12" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
    <text x="380" y="46" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#ffffff" opacity="0.7">Feedback Loop</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(380,378)">
    <text x="0" y="0" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a0a0b0" opacity="0.5">3つの柱がフィードバックループでつながり、ハーネスを形成する</text>
  </g>
</svg>
