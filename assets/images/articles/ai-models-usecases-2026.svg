    <text x="82" y="24" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" opacity="0.9">Low Cost</text>
    <text x="82" y="40" font-family="sans-serif" font-size="9" fill="#6b6b80">コスト最優先</text>
    <line x1="15" y1="52" x2="195" y2="52" stroke="#1e1e30" stroke-width="1"/>
    <rect x="15" y="62" width="120" height="24" rx="12" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1"/>
    <text x="75" y="79" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#06b6d4">DeepSeek V4</text>
  </g>

  <!-- Bottom note -->
  <text x="380" y="318" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b80" opacity="0.6">2026年は「万能モデル」から「用途別最適解」の時代へ</text>
</svg>
