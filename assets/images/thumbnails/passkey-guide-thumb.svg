<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060b"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="75" x2="800" y2="75"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="450"/><line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Decorative orbs -->
  <circle cx="650" cy="100" r="120" fill="url(#glow1)"/>
  <circle cx="150" cy="350" r="100" fill="url(#glow2)"/>

  <!-- Shield icon (main motif) -->
  <g transform="translate(400,170)">
    <!-- Shield body -->
    <path d="M0-110 L70-80 L70 10 Q70 70 0 110 Q-70 70 -70 10 L-70-80 Z"
          fill="url(#shield-fill)" stroke="url(#accent)" stroke-width="2.5"/>
    <!-- Inner shield glow line -->
    <path d="M0-85 L50-62 L50 5 Q50 52 0 85 Q-50 52 -50 5 L-50-62 Z"
          fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.3"/>
    <!-- Key icon inside shield -->
    <circle cx="0" cy="-20" r="18" fill="none" stroke="#00d4ff" stroke-width="2.5" opacity="0.8"/>
    <line x1="0" y1="-2" x2="0" y2="50" stroke="#00d4ff" stroke-width="2.5" opacity="0.8"/>
    <line x1="0" y1="35" x2="12" y2="35" stroke="#00d4ff" stroke-width="2.5" opacity="0.8"/>
    <line x1="0" y1="48" x2="10" y2="48" stroke="#00d4ff" stroke-width="2.5" opacity="0.8"/>
    <!-- Fingerprint arcs (left side of shield) -->
    <g opacity="0.3" stroke="#a855f7" stroke-width="1" fill="none">
      <path d="M-35-20 Q-35-40 -15-40"/>
      <path d="M-38-15 Q-38-48 -10-48"/>
      <path d="M-32-10 Q-32-32 -18-32"/>
    </g>
  </g>

  <!-- Floating lock dots -->
  <circle cx="250" cy="120" r="3" fill="#7c3aed" opacity="0.5"/>
  <circle cx="550" cy="140" r="2.5" fill="#00d4ff" opacity="0.4"/>
  <circle cx="200" cy="220" r="2" fill="#a855f7" opacity="0.3"/>
  <circle cx="600" cy="250" r="3.5" fill="#7c3aed" opacity="0.35"/>
  <circle cx="300" cy="300" r="2" fill="#00d4ff" opacity="0.3"/>
  <circle cx="520" cy="80" r="2" fill="#a855f7" opacity="0.4"/>

  <!-- Connection lines -->
  <line x1="250" y1="120" x2="330" y2="100" stroke="#7c3aed" stroke-width="0.5" opacity="0.15"/>
  <line x1="550" y1="140" x2="470" y2="120" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>

  <!-- Title text -->
  <text x="400" y="360" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#ffffff" opacity="0.92">Passkey Guide</text>
  <text x="400" y="390" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0a0b0" opacity="0.6">Beyond Passwords</text>
</svg>
