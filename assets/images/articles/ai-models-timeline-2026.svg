  <g>
    <circle cx="540" cy="155" r="4" fill="#10b981" opacity="0.7"/>
    <line x1="540" y1="160" x2="540" y2="210" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    <text x="540" y="222" text-anchor="middle" font-family="sans-serif" font-size="8.5" font-weight="600" fill="#10b981" opacity="0.8">GPT-5.4 mini/nano</text>
