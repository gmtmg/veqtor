<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#10101e"/>
    </linearGradient>
  </defs>

  <rect width="760" height="380" rx="12" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="95" x2="760" y2="95"/><line x1="0" y1="190" x2="760" y2="190"/>
    <line x1="0" y1="285" x2="760" y2="285"/>
    <line x1="190" y1="0" x2="190" y2="380"/><line x1="380" y1="0" x2="380" y2="380"/>
    <line x1="570" y1="0" x2="570" y2="380"/>
  </g>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#a0a0b0" opacity="0.8" letter-spacing="0.1em">PLAIN LLM vs RAG</text>

  <!-- ===== Left: Plain LLM ===== -->
  <text x="190" y="65" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#ef4444" opacity="0.8">素のLLM</text>

  <!-- User question -->
  <g transform="translate(190,110)">
    <rect x="-80" y="-18" width="160" height="36" rx="8" fill="#141425" stroke="#a0a0b0" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffffff" opacity="0.8">ユーザーの質問</text>
  </g>

  <!-- Arrow down -->
  <line x1="190" y1="130" x2="190" y2="155" stroke="#a0a0b0" stroke-width="1" opacity="0.4"/>
  <polygon points="187,155 190,162 193,155" fill="#a0a0b0" opacity="0.4"/>

  <!-- LLM box -->
  <g transform="translate(190,195)">
    <rect x="-70" y="-28" width="140" height="56" rx="8" fill="#141425" stroke="#ef4444" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#ef4444" opacity="0.8">LLM</text>
    <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b6b80" opacity="0.6">学習済みデータのみ</text>
  </g>

  <!-- Arrow down -->
  <line x1="190" y1="225" x2="190" y2="255" stroke="#a0a0b0" stroke-width="1" opacity="0.4"/>
  <polygon points="187,255 190,262 193,255" fill="#a0a0b0" opacity="0.4"/>

  <!-- Output with warning -->
  <g transform="translate(190,295)">
    <rect x="-85" y="-22" width="170" height="50" rx="8" fill="#141425" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
    <text x="0" y="-2" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffffff" opacity="0.7">回答</text>
    <text x="0" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ef4444" opacity="0.7">古い情報・ハルシネーションのリスク</text>
  </g>

  <!-- Divider -->
  <line x1="380" y1="55" x2="380" y2="360" stroke="#1e1e30" stroke-width="1"/>
  <text x="380" y="370" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b6b80" opacity="0.5">VS</text>

  <!-- ===== Right: RAG ===== -->
  <text x="570" y="65" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#00d4ff" opacity="0.8">RAG</text>

  <!-- User question -->
  <g transform="translate(500,110)">
    <rect x="-65" y="-18" width="130" height="36" rx="8" fill="#141425" stroke="#a0a0b0" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffffff" opacity="0.8">ユーザーの質問</text>
  </g>

  <!-- Arrow to retrieval -->
  <line x1="540" y1="130" x2="570" y2="150" stroke="#00d4ff" stroke-width="1" opacity="0.4" stroke-dasharray="4,2"/>
  <polygon points="567,150 574,156 571,148" fill="#00d4ff" opacity="0.4"/>

  <!-- Knowledge base -->
  <g transform="translate(650,155)">
    <rect x="-50" y="-18" width="100" height="40" rx="6" fill="#141425" stroke="#00d4ff" stroke-width="1.2"/>
    <text x="0" y="-1" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00d4ff" opacity="0.8">外部知識ベース</text>
    <text x="0" y="12" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b6b80" opacity="0.6">最新・社内データ</text>
  </g>

  <!-- Arrow: retrieval results merge -->
  <line x1="630" y1="180" x2="590" y2="210" stroke="#00d4ff" stroke-width="1" opacity="0.4" stroke-dasharray="4,2"/>

  <!-- Augmented context -->
  <g transform="translate(570,195)">
    <rect x="-80" y="-12" width="160" height="24" rx="6" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00d4ff" opacity="0.7">質問 + 関連文書</text>
  </g>

  <!-- Arrow down -->
  <line x1="570" y1="210" x2="570" y2="230" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <polygon points="567,230 570,237 573,230" fill="#f59e0b" opacity="0.4"/>

  <!-- LLM box (RAG) -->
  <g transform="translate(570,265)">
    <rect x="-70" y="-22" width="140" height="44" rx="8" fill="#141425" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="0" y="-3" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#f59e0b" opacity="0.8">LLM</text>
    <text x="0" y="12" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b6b80" opacity="0.6">文脈付きで推論</text>
  </g>

  <!-- Arrow down -->
  <line x1="570" y1="290" x2="570" y2="310" stroke="#a0a0b0" stroke-width="1" opacity="0.4"/>
  <polygon points="567,310 570,317 573,310" fill="#a0a0b0" opacity="0.4"/>

  <!-- Output (good) -->
  <g transform="translate(570,340)">
    <rect x="-85" y="-18" width="170" height="36" rx="8" fill="#141425" stroke="#10b981" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffffff" opacity="0.8">回答</text>
    <text x="0" y="13" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#10b981" opacity="0.8">根拠付き・最新情報に対応</text>
  </g>
</svg>
