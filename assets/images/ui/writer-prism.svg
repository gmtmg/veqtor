<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <circle cx="60" cy="60" r="58" fill="#0e0e18" stroke="#1e1e30" stroke-width="1"/>
  <!-- Prism motif — triangle -->
  <polygon points="60,30 86,78 34,78" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
  <!-- Light beam entering prism -->
  <line x1="28" y1="52" x2="52" y2="58" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Dispersed spectrum rays -->
  <line x1="68" y1="54" x2="92" y2="42" stroke="#ff3cac" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="70" y1="58" x2="94" y2="52" stroke="#f59e0b" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="71" y1="62" x2="94" y2="62" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="70" y1="66" x2="92" y2="72" stroke="#00d4ff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <!-- Inner prism glow -->
  <polygon points="60,40 78,72 42,72" fill="#f59e0b" opacity="0.08"/>
  <!-- Center highlight -->
  <circle cx="60" cy="62" r="4" fill="#f59e0b" opacity="0.25"/>
  <!-- Decorative ring -->
  <circle cx="60" cy="60" r="42" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.12" stroke-dasharray="4 8"/>
</svg>
