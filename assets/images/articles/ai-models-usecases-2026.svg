    <line x1="15" y1="52" x2="195" y2="52" stroke="#1e1e30" stroke-width="1"/>
    <rect x="15" y="62" width="76" height="24" rx="12" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1"/>
    <text x="53" y="79" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#ef4444">Grok 4</text>
  </g>

  <!-- Privacy -->
  <g transform="translate(278,186)">
    <rect width="210" height="100" rx="10" fill="#141425" stroke="#1e1e30" stroke-width="1"/>
    <g transform="translate(26,30)">
      <rect x="0" y="-10" width="16" height="16" rx="3" fill="none" stroke="#f59e0b" stroke-width="1.8" opacity="0.7"/>
      <circle cx="8" cy="-2" r="3" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
      <line x1="8" y1="1" x2="8" y2="4" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    </g>
    <text x="82" y="24" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" opacity="0.9">Privacy</text>
    <text x="82" y="40" font-family="sans-serif" font-size="9" fill="#6b6b80">プライバシー・自社運用</text>
    <line x1="15" y1="52" x2="195" y2="52" stroke="#1e1e30" stroke-width="1"/>
    <rect x="15" y="62" width="95" height="24" rx="12" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
    <text x="62" y="79" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#f59e0b">Llama 4</text>
  </g>

  <!-- Cost -->
  <g transform="translate(504,186)">
    <rect width="210" height="100" rx="10" fill="#141425" stroke="#1e1e30" stroke-width="1"/>
    <g transform="translate(26,30)">
      <text x="0" y="2" font-family="sans-serif" font-size="20" font-weight="700" fill="#06b6d4" opacity="0.7">$</text>
