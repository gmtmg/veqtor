name: Deploy to Xserver

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 最新のコードを受け取る
      uses: actions/checkout@v4

    - name: 2. SSH鍵をセットアップ
      env:
        SSH_PRIVATE_KEY: ${{ secrets.XSERVER_SSH_KEY }}
        HOST_NAME: ${{ secrets.XSERVER_HOST }}
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p 10022 -H $HOST_NAME >> ~/.ssh/known_hosts 2>/dev/null

    - name: 3. SSH接続テスト
      env:
        USER_NAME: ${{ secrets.XSERVER_USER }}
        HOST_NAME: ${{ secrets.XSERVER_HOST }}
      run: |
        ssh -p 10022 -v -o BatchMode=yes -o ConnectTimeout=10 ${USER_NAME}@${HOST_NAME} "echo SSH_OK" 2>&1 || true

    - name: 4. エックスサーバーへ配置する
      env:
        USER_NAME: ${{ secrets.XSERVER_USER }}
        HOST_NAME: ${{ secrets.XSERVER_HOST }}
        TARGET_DIR: /home/${{ secrets.XSERVER_USER }}/algoyosuga.com/public_html/veqtor/
      run: |
        rsync -avz -e "ssh -p 10022" \
          --delete \
          --exclude='.git/' \
          --exclude='.github/' \
          --exclude='.gitignore' \
          --exclude='.DS_Store' \
          --exclude='ARTICLE_INDEX.md' \
          --exclude='STYLE_GUIDE.md' \
          --exclude='IMAGE_GUIDE.md' \
          ./ ${USER_NAME}@${HOST_NAME}:${TARGET_DIR}
