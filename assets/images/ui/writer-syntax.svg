<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <circle cx="60" cy="60" r="58" fill="#0e0e18" stroke="#1e1e30" stroke-width="1"/>
  <!-- Angle brackets </> motif -->
  <!-- Left bracket < -->
  <polyline points="46,44 30,60 46,76" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Right bracket > -->
  <polyline points="74,44 90,60 74,76" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Slash / -->
  <line x1="66" y1="38" x2="54" y2="82" stroke="#10b981" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Cursor blink line -->
  <line x1="60" y1="50" x2="60" y2="70" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Decorative dots (like code) -->
  <circle cx="38" cy="36" r="1.5" fill="#10b981" opacity="0.3"/>
  <circle cx="82" cy="36" r="1.5" fill="#10b981" opacity="0.3"/>
  <circle cx="38" cy="84" r="1.5" fill="#10b981" opacity="0.3"/>
  <circle cx="82" cy="84" r="1.5" fill="#10b981" opacity="0.3"/>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="42" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.12" stroke-dasharray="3 7"/>
</svg>
