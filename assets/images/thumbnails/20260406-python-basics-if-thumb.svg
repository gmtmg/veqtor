<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060b"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ff3cac"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3776ab" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffd43b" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="pygrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3776ab"/>
      <stop offset="100%" stop-color="#ffd43b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.06">
    <line x1="0" y1="75" x2="800" y2="75" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="225" x2="800" y2="225" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="375" x2="800" y2="375" stroke="#fff" stroke-width="0.5"/>
    <line x1="133" y1="0" x2="133" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="266" y1="0" x2="266" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="533" y1="0" x2="533" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="666" y1="0" x2="666" y2="450" stroke="#fff" stroke-width="0.5"/>
  </g>
  <!-- Orbs -->
  <circle cx="200" cy="120" r="160" fill="url(#glow1)" opacity="0.7"/>
  <circle cx="620" cy="340" r="120" fill="#ffd43b" opacity="0.05"/>
  <!-- Python logo mark -->
  <g transform="translate(340, 70)">
    <rect x="0" y="0" width="120" height="120" rx="24" fill="none" stroke="url(#pygrad)" stroke-width="2" opacity="0.4"/>
    <text x="60" y="72" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="48" font-weight="700" fill="url(#pygrad)">Py</text>
  </g>
  <!-- Code editor mockup -->
  <g transform="translate(180, 210)">
    <rect width="440" height="130" rx="10" fill="#0e0e18" stroke="#1e1e30" stroke-width="1.5"/>
    <!-- Editor dots -->
    <circle cx="20" cy="16" r="4" fill="#ef4444" opacity="0.6"/>
    <circle cx="34" cy="16" r="4" fill="#f59e0b" opacity="0.6"/>
    <circle cx="48" cy="16" r="4" fill="#10b981" opacity="0.6"/>
    <!-- Code lines -->
    <text x="20" y="52" font-family="JetBrains Mono, monospace" font-size="13" fill="#7c3aed">if</text>
    <text x="38" y="52" font-family="JetBrains Mono, monospace" font-size="13" fill="#c8c8d0"> score &gt;= </text>
    <text x="130" y="52" font-family="JetBrains Mono, monospace" font-size="13" fill="#ffd43b">80</text>
    <text x="148" y="52" font-family="JetBrains Mono, monospace" font-size="13" fill="#c8c8d0">:</text>
    <text x="36" y="74" font-family="JetBrains Mono, monospace" font-size="13" fill="#00d4ff">print</text>
    <text x="76" y="74" font-family="JetBrains Mono, monospace" font-size="13" fill="#c8c8d0">(</text>
    <text x="84" y="74" font-family="JetBrains Mono, monospace" font-size="13" fill="#10b981">"B"</text>
    <text x="108" y="74" font-family="JetBrains Mono, monospace" font-size="13" fill="#c8c8d0">)</text>
    <!-- Run button -->
    <rect x="320" y="92" width="100" height="28" rx="6" fill="#00d4ff" opacity="0.9"/>
    <text x="370" y="111" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#06060b">&#9654; Run</text>
  </g>
  <!-- Output area -->
  <text x="210" y="365" font-family="JetBrains Mono, monospace" font-size="13" fill="#10b981" opacity="0.7">&gt; B</text>
  <!-- Title -->
  <text x="400" y="410" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#ffffff">Python Basics: if</text>
  <text x="400" y="435" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#6b6b80">Interactive coding course</text>
</svg>
