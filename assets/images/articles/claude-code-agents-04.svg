<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0e0e1c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" rx="12" fill="url(#bg4)"/>
  <!-- Invocation methods -->
  <text x="400" y="35" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Invocation Methods</text>
  <!-- Method 1: Natural Language -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="220" height="100" rx="10" fill="#00d4ff" fill-opacity="0.04" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
    <text x="110" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#00d4ff">Natural Language</text>
    <text x="110" y="52" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8c8d0">"Use the code-reviewer</text>
    <text x="110" y="68" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8c8d0"> agent to check this"</text>
    <text x="110" y="90" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6b6b80">Loose delegation</text>
  </g>
  <!-- Method 2: @mention -->
  <g transform="translate(290, 60)">
    <rect x="0" y="0" width="220" height="100" rx="10" fill="#7c3aed" fill-opacity="0.06" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.3"/>
    <text x="110" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#7c3aed">@Mention</text>
    <text x="110" y="52" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8c8d0">@"code-reviewer"</text>
    <text x="110" y="68" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8c8d0"> review auth module</text>
    <text x="110" y="90" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6b6b80">Guaranteed invocation</text>
  </g>
  <!-- Method 3: CLI flag -->
  <g transform="translate(540, 60)">
    <rect x="0" y="0" width="220" height="100" rx="10" fill="#ff3cac" fill-opacity="0.04" stroke="#ff3cac" stroke-width="1" stroke-opacity="0.3"/>
    <text x="110" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#ff3cac">CLI Flag</text>
    <text x="110" y="55" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8c8d0">claude --agent</text>
    <text x="110" y="71" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8c8d0">  code-reviewer</text>
    <text x="110" y="90" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6b6b80">Session-wide mode</text>
  </g>
  <!-- Method 4: /agents command -->
  <g transform="translate(165, 180)">
    <rect x="0" y="0" width="220" height="100" rx="10" fill="#10b981" fill-opacity="0.05" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
    <text x="110" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#10b981">/agents Command</text>
    <text x="110" y="55" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8c8d0">/agents</text>
    <text x="110" y="90" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6b6b80">Interactive menu</text>
  </g>
  <!-- Method 5: Resume -->
  <g transform="translate(415, 180)">
    <rect x="0" y="0" width="220" height="100" rx="10" fill="#f59e0b" fill-opacity="0.05" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
    <text x="110" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#f59e0b">Resume</text>
    <text x="110" y="52" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8c8d0">"Continue that</text>
    <text x="110" y="68" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8c8d0"> code review"</text>
    <text x="110" y="90" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6b6b80">Context preserved</text>
  </g>
</svg>
