<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#10101e"/>
    </linearGradient>
  </defs>

  <rect width="760" height="420" rx="12" fill="url(#bbg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="105" x2="760" y2="105"/><line x1="0" y1="210" x2="760" y2="210"/>
    <line x1="0" y1="315" x2="760" y2="315"/>
    <line x1="190" y1="0" x2="190" y2="420"/><line x1="380" y1="0" x2="380" y2="420"/>
    <line x1="570" y1="0" x2="570" y2="420"/>
  </g>

  <!-- Title -->
  <text x="380" y="35" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#a855f7" opacity="0.9" letter-spacing="0.08em">BUILDING SECURITY ANALOGY</text>

  <!-- Divider -->
  <line x1="380" y1="50" x2="380" y2="390" stroke="#2a2a40" stroke-width="1"/>

  <!-- ===== LEFT: Traditional Building (entry-only security) ===== -->
  <text x="190" y="62" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#ef4444" opacity="0.8">従来のビル：入口だけ警備</text>

  <!-- Building outline -->
  <rect x="80" y="80" width="220" height="280" rx="4" fill="#141425" stroke="#2a2a40" stroke-width="1.5"/>

  <!-- Entry gate (guarded) -->
  <g transform="translate(190,345)">
    <rect x="-30" y="-12" width="60" height="24" rx="4" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#ef4444" opacity="0.8">正面入口</text>
    <!-- Guard icon -->
    <circle cx="-45" cy="0" r="8" fill="none" stroke="#ef4444" stroke-width="1.2" opacity="0.6"/>
    <circle cx="-45" cy="-4" r="3" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Floor 3 (top) -->
  <g transform="translate(80,85)">
    <rect x="0" y="0" width="220" height="80" fill="none" stroke="#2a2a40" stroke-width="0.5"/>
    <text x="15" y="18" font-family="sans-serif" font-size="9" fill="#6b6b80" opacity="0.6">3F: サーバールーム</text>
    <!-- Open door -->
    <rect x="80" y="25" width="30" height="40" rx="2" fill="#1a1a2e" stroke="#6b6b80" stroke-width="0.8" opacity="0.4"/>
    <text x="95" y="50" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6b6b80" opacity="0.5">施錠なし</text>
    <!-- Server -->
    <rect x="140" y="30" width="40" height="30" rx="3" fill="#1a1a2e" stroke="#6b6b80" stroke-width="0.8"/>
    <circle cx="170" cy="40" r="2" fill="#10b981" opacity="0.4"/>
    <circle cx="170" cy="50" r="2" fill="#10b981" opacity="0.4"/>
  </g>

  <!-- Floor 2 -->
  <g transform="translate(80,165)">
    <rect x="0" y="0" width="220" height="80" fill="none" stroke="#2a2a40" stroke-width="0.5"/>
    <text x="15" y="18" font-family="sans-serif" font-size="9" fill="#6b6b80" opacity="0.6">2F: 経理部</text>
    <!-- Open door -->
    <rect x="80" y="25" width="30" height="40" rx="2" fill="#1a1a2e" stroke="#6b6b80" stroke-width="0.8" opacity="0.4"/>
    <text x="95" y="50" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6b6b80" opacity="0.5">施錠なし</text>
    <!-- Docs -->
    <rect x="150" y="32" width="26" height="32" rx="2" fill="none" stroke="#6b6b80" stroke-width="0.8" opacity="0.5"/>
    <line x1="155" y1="42" x2="171" y2="42" stroke="#6b6b80" stroke-width="0.5" opacity="0.4"/>
    <line x1="155" y1="48" x2="171" y2="48" stroke="#6b6b80" stroke-width="0.5" opacity="0.4"/>
    <line x1="155" y1="54" x2="165" y2="54" stroke="#6b6b80" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Floor 1 -->
  <g transform="translate(80,245)">
    <rect x="0" y="0" width="220" height="80" fill="none" stroke="#2a2a40" stroke-width="0.5"/>
    <text x="15" y="18" font-family="sans-serif" font-size="9" fill="#6b6b80" opacity="0.6">1F: ロビー</text>
    <!-- Intruder walking freely -->
    <g transform="translate(150,45)">
      <circle cx="0" cy="-10" r="6" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <line x1="0" y1="-4" x2="0" y2="10" stroke="#ef4444" stroke-width="1.2"/>
      <line x1="-8" y1="2" x2="8" y2="2" stroke="#ef4444" stroke-width="1.2"/>
      <line x1="0" y1="10" x2="-6" y2="20" stroke="#ef4444" stroke-width="1.2"/>
      <line x1="0" y1="10" x2="6" y2="20" stroke="#ef4444" stroke-width="1.2"/>
    </g>
    <!-- Movement arrows -->
    <path d="M155 40 L155 10" fill="none" stroke="#ef4444" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>
    <polygon points="153,10 155,4 157,10" fill="#ef4444" opacity="0.5"/>
    <text x="175" y="48" font-family="sans-serif" font-size="7" fill="#ef4444" opacity="0.6">自由に</text>
    <text x="175" y="56" font-family="sans-serif" font-size="7" fill="#ef4444" opacity="0.6">移動可能</text>
  </g>

  <!-- ===== RIGHT: Zero Trust Building ===== -->
  <text x="570" y="62" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#10b981" opacity="0.8">ゼロトラスト：各階・各部屋で認証</text>

  <!-- Building outline -->
  <rect x="460" y="80" width="220" height="280" rx="4" fill="#141425" stroke="#2a2a40" stroke-width="1.5"/>

  <!-- Entry gate -->
  <g transform="translate(570,345)">
    <rect x="-30" y="-12" width="60" height="24" rx="4" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#10b981" opacity="0.8">ID認証</text>
    <!-- Shield -->
    <g transform="translate(-45,0)">
      <path d="M0-7 L6-5 L6 2 Q6 6 0 8 Q-6 6 -6 2 L-6-5 Z" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1"/>
    </g>
  </g>

  <!-- Floor 3 (top) -->
  <g transform="translate(460,85)">
    <rect x="0" y="0" width="220" height="80" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>
    <text x="15" y="18" font-family="sans-serif" font-size="9" fill="#10b981" opacity="0.6">3F: サーバールーム</text>
    <!-- Locked door -->
    <rect x="80" y="25" width="30" height="40" rx="2" fill="#10b981" fill-opacity="0.05" stroke="#10b981" stroke-width="1"/>
    <!-- Lock icon -->
    <g transform="translate(95,40)">
      <rect x="-5" y="0" width="10" height="8" rx="2" fill="none" stroke="#10b981" stroke-width="1"/>
      <path d="M-3 0 L-3-4 Q-3-7 0-7 Q3-7 3-4 L3 0" fill="none" stroke="#10b981" stroke-width="1"/>
    </g>
    <text x="95" y="62" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#10b981" opacity="0.7">生体認証</text>
    <!-- Server -->
    <rect x="140" y="30" width="40" height="30" rx="3" fill="#1a1a2e" stroke="#10b981" stroke-width="0.8"/>
    <circle cx="170" cy="40" r="2" fill="#10b981" opacity="0.6"/>
    <circle cx="170" cy="50" r="2" fill="#10b981" opacity="0.6"/>
  </g>

  <!-- Floor 2 -->
  <g transform="translate(460,165)">
    <rect x="0" y="0" width="220" height="80" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>
    <text x="15" y="18" font-family="sans-serif" font-size="9" fill="#10b981" opacity="0.6">2F: 経理部</text>
    <!-- Locked door -->
    <rect x="80" y="25" width="30" height="40" rx="2" fill="#10b981" fill-opacity="0.05" stroke="#10b981" stroke-width="1"/>
    <!-- Lock icon -->
    <g transform="translate(95,40)">
      <rect x="-5" y="0" width="10" height="8" rx="2" fill="none" stroke="#10b981" stroke-width="1"/>
      <path d="M-3 0 L-3-4 Q-3-7 0-7 Q3-7 3-4 L3 0" fill="none" stroke="#10b981" stroke-width="1"/>
    </g>
    <text x="95" y="62" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#10b981" opacity="0.7">カード認証</text>
    <!-- Docs (protected) -->
    <rect x="150" y="32" width="26" height="32" rx="2" fill="none" stroke="#10b981" stroke-width="0.8" opacity="0.5"/>
    <line x1="155" y1="42" x2="171" y2="42" stroke="#10b981" stroke-width="0.5" opacity="0.4"/>
    <line x1="155" y1="48" x2="171" y2="48" stroke="#10b981" stroke-width="0.5" opacity="0.4"/>
    <line x1="155" y1="54" x2="165" y2="54" stroke="#10b981" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Floor 1 -->
  <g transform="translate(460,245)">
    <rect x="0" y="0" width="220" height="80" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>
    <text x="15" y="18" font-family="sans-serif" font-size="9" fill="#10b981" opacity="0.6">1F: ロビー</text>
    <!-- Visitor (blocked at door) -->
    <g transform="translate(130,45)">
      <circle cx="0" cy="-10" r="6" fill="none" stroke="#f59e0b" stroke-width="1.2"/>
      <line x1="0" y1="-4" x2="0" y2="10" stroke="#f59e0b" stroke-width="1.2"/>
      <line x1="-8" y1="2" x2="8" y2="2" stroke="#f59e0b" stroke-width="1.2"/>
    </g>
    <!-- Blocked arrow -->
    <g transform="translate(145,30)">
      <line x1="0" y1="0" x2="0" y2="-14" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
      <line x1="-5" y1="-10" x2="5" y2="-10" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
      <text x="14" y="-4" font-family="sans-serif" font-size="7" fill="#ef4444" opacity="0.7">権限なし</text>
    </g>
    <!-- Checkpoint -->
    <rect x="80" y="25" width="30" height="40" rx="2" fill="#10b981" fill-opacity="0.05" stroke="#10b981" stroke-width="1"/>
    <g transform="translate(95,40)">
      <rect x="-5" y="0" width="10" height="8" rx="2" fill="none" stroke="#10b981" stroke-width="1"/>
      <path d="M-3 0 L-3-4 Q-3-7 0-7 Q3-7 3-4 L3 0" fill="none" stroke="#10b981" stroke-width="1"/>
    </g>
    <text x="95" y="62" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#10b981" opacity="0.7">認証必須</text>
  </g>

  <!-- VS label -->
  <g transform="translate(380,215)">
    <circle cx="0" cy="0" r="18" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#6b6b80" opacity="0.8">VS</text>
  </g>

  <!-- Bottom summary -->
  <text x="380" y="405" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b80" opacity="0.6">入口だけの警備 vs 各階・各部屋ごとの認証</text>
</svg>
