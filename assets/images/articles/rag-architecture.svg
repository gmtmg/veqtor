<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#10101e"/>
    </linearGradient>
  </defs>

  <rect width="760" height="440" rx="12" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="110" x2="760" y2="110"/><line x1="0" y1="220" x2="760" y2="220"/>
    <line x1="0" y1="330" x2="760" y2="330"/>
    <line x1="190" y1="0" x2="190" y2="440"/><line x1="380" y1="0" x2="380" y2="440"/>
    <line x1="570" y1="0" x2="570" y2="440"/>
  </g>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#a0a0b0" opacity="0.8" letter-spacing="0.1em">RAG ARCHITECTURE</text>

  <!-- ===== Layer 1: Data Preparation ===== -->
  <text x="380" y="65" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#7c3aed" opacity="0.7">データ準備フェーズ</text>

  <!-- Documents -->
  <g transform="translate(120,120)">
    <rect x="-55" y="-30" width="110" height="60" rx="8" fill="#141425" stroke="#7c3aed" stroke-width="1.2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#7c3aed" opacity="0.8">ドキュメント</text>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b6b80" opacity="0.6">PDF, Web, DB...</text>
  </g>

  <!-- Arrow -->
  <line x1="180" y1="120" x2="230" y2="120" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
  <polygon points="230,117 237,120 230,123" fill="#7c3aed" opacity="0.4"/>

  <!-- Chunking -->
  <g transform="translate(300,120)">
    <rect x="-55" y="-30" width="110" height="60" rx="8" fill="#141425" stroke="#7c3aed" stroke-width="1.2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#7c3aed" opacity="0.8">チャンキング</text>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b6b80" opacity="0.6">テキストを分割</text>
  </g>

  <!-- Arrow -->
  <line x1="360" y1="120" x2="410" y2="120" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
  <polygon points="410,117 417,120 410,123" fill="#7c3aed" opacity="0.4"/>

  <!-- Embedding -->
  <g transform="translate(480,120)">
    <rect x="-55" y="-30" width="110" height="60" rx="8" fill="#141425" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#f59e0b" opacity="0.8">Embedding</text>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b6b80" opacity="0.6">ベクトル化</text>
  </g>

  <!-- Arrow -->
  <line x1="540" y1="120" x2="590" y2="120" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
  <polygon points="590,117 597,120 590,123" fill="#f59e0b" opacity="0.4"/>

  <!-- Vector DB -->
  <g transform="translate(660,120)">
    <rect x="-55" y="-30" width="110" height="60" rx="8" fill="#141425" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#00d4ff" opacity="0.9">ベクトルDB</text>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b6b80" opacity="0.6">Pinecone, Chroma...</text>
  </g>

  <!-- Divider -->
  <line x1="60" y1="180" x2="700" y2="180" stroke="#1e1e30" stroke-width="1"/>

  <!-- ===== Layer 2: Query Phase ===== -->
  <text x="380" y="210" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#00d4ff" opacity="0.7">クエリフェーズ</text>

  <!-- User Query -->
  <g transform="translate(120,270)">
    <rect x="-55" y="-30" width="110" height="60" rx="8" fill="#141425" stroke="#a0a0b0" stroke-width="1.2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#ffffff" opacity="0.8">ユーザー質問</text>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b6b80" opacity="0.6">自然言語</text>
  </g>

  <!-- Arrow to embedding -->
  <line x1="180" y1="270" x2="230" y2="270" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
  <polygon points="230,267 237,270 230,273" fill="#00d4ff" opacity="0.4"/>

  <!-- Query Embedding -->
  <g transform="translate(300,270)">
    <rect x="-55" y="-30" width="110" height="60" rx="8" fill="#141425" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#f59e0b" opacity="0.8">Embedding</text>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b6b80" opacity="0.6">質問をベクトル化</text>
  </g>

  <!-- Arrow to similarity search -->
  <line x1="360" y1="270" x2="410" y2="270" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
  <polygon points="410,267 417,270 410,273" fill="#00d4ff" opacity="0.4"/>

  <!-- Similarity Search -->
  <g transform="translate(480,270)">
    <rect x="-55" y="-30" width="110" height="60" rx="8" fill="#141425" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#00d4ff" opacity="0.9">類似度検索</text>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b6b80" opacity="0.6">ベクトルDB参照</text>
  </g>

  <!-- Arrow up to VectorDB -->
  <line x1="560" y1="250" x2="620" y2="160" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,2" opacity="0.3"/>

  <!-- Arrow from search to LLM -->
  <line x1="540" y1="270" x2="575" y2="270" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="575" y1="270" x2="575" y2="340" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="575" y1="340" x2="430" y2="370" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>

  <!-- Divider -->
  <line x1="60" y1="330" x2="700" y2="330" stroke="#1e1e30" stroke-width="1"/>

  <!-- ===== Layer 3: Generation ===== -->
  <text x="200" y="360" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#f59e0b" opacity="0.7">生成フェーズ</text>

  <!-- Augmented Prompt -->
  <g transform="translate(300,395)">
    <rect x="-75" y="-22" width="150" height="44" rx="8" fill="#141425" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="0" y="-4" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#f59e0b" opacity="0.8">拡張プロンプト</text>
    <text x="0" y="12" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b6b80" opacity="0.6">質問 + 関連チャンク</text>
  </g>

  <!-- Arrow from user query down -->
  <line x1="120" y1="305" x2="120" y2="395" stroke="#a0a0b0" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="395" x2="220" y2="395" stroke="#a0a0b0" stroke-width="1" stroke-dasharray="4,2" opacity="0.3"/>
  <polygon points="220,392 227,395 220,398" fill="#f59e0b" opacity="0.4"/>

  <!-- Arrow to LLM -->
  <line x1="380" y1="395" x2="460" y2="395" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
  <polygon points="460,392 467,395 460,398" fill="#10b981" opacity="0.4"/>

  <!-- LLM -->
  <g transform="translate(530,395)">
    <rect x="-55" y="-22" width="110" height="44" rx="8" fill="#141425" stroke="#10b981" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#10b981" opacity="0.9">LLM</text>
    <text x="0" y="12" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b6b80" opacity="0.6">根拠ある回答を生成</text>
  </g>

  <!-- Output arrow -->
  <line x1="590" y1="395" x2="640" y2="395" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
  <polygon points="640,392 648,395 640,398" fill="#10b981" opacity="0.5"/>

  <!-- Output -->
  <text x="690" y="400" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#10b981" opacity="0.8">回答</text>
</svg>
