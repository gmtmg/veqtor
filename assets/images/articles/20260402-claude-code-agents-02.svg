<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0e0e1c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" rx="12" fill="url(#bg2)"/>
  <!-- File structure illustration -->
  <!-- Folder icon -->
  <text x="80" y="50" font-family="monospace" font-size="14" font-weight="700" fill="#00d4ff">Directory Structure</text>
  <line x1="80" y1="60" x2="300" y2="60" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <!-- Tree -->
  <g font-family="monospace" font-size="13">
    <text x="80" y="95" fill="#f59e0b">project/</text>
    <text x="100" y="120" fill="#6b6b80">|</text>
    <text x="100" y="140" fill="#6b6b80">+--</text>
    <text x="140" y="140" fill="#7c3aed">.claude/</text>
    <text x="120" y="165" fill="#6b6b80">|</text>
    <text x="120" y="185" fill="#6b6b80">+--</text>
    <text x="160" y="185" fill="#7c3aed">agents/</text>
    <text x="140" y="210" fill="#6b6b80">|</text>
    <text x="140" y="230" fill="#6b6b80">+--</text>
    <text x="180" y="230" fill="#00d4ff">code-reviewer.md</text>
    <text x="140" y="255" fill="#6b6b80">+--</text>
    <text x="180" y="255" fill="#00d4ff">debugger.md</text>
    <text x="140" y="280" fill="#6b6b80">+--</text>
    <text x="180" y="280" fill="#00d4ff">test-runner.md</text>
  </g>
  <!-- Scope boxes -->
  <g transform="translate(440, 70)">
    <text x="0" y="0" font-family="monospace" font-size="14" font-weight="700" fill="#00d4ff">Agent Scopes</text>
    <line x1="0" y1="10" x2="300" y2="10" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <!-- Project scope -->
    <rect x="0" y="30" width="300" height="70" rx="8" fill="#7c3aed" fill-opacity="0.06" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.3"/>
    <text x="15" y="55" font-family="monospace" font-size="12" font-weight="600" fill="#7c3aed">.claude/agents/</text>
    <text x="15" y="78" font-family="Inter, sans-serif" font-size="11" fill="#c8c8d0">Project scope - team shared</text>
    <!-- User scope -->
    <rect x="0" y="115" width="300" height="70" rx="8" fill="#00d4ff" fill-opacity="0.06" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
    <text x="15" y="140" font-family="monospace" font-size="12" font-weight="600" fill="#00d4ff">~/.claude/agents/</text>
    <text x="15" y="163" font-family="Inter, sans-serif" font-size="11" fill="#c8c8d0">User scope - personal use</text>
    <!-- Org scope -->
    <rect x="0" y="200" width="300" height="70" rx="8" fill="#ff3cac" fill-opacity="0.06" stroke="#ff3cac" stroke-width="1" stroke-opacity="0.3"/>
    <text x="15" y="225" font-family="monospace" font-size="12" font-weight="600" fill="#ff3cac">Managed settings</text>
    <text x="15" y="248" font-family="Inter, sans-serif" font-size="11" fill="#c8c8d0">Organization scope - admin deployed</text>
  </g>
  <!-- Caption -->
  <text x="400" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#6b6b80">エージェントファイルの配置場所とスコープの関係</text>
</svg>
