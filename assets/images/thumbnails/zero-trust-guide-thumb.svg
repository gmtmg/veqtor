<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060b"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="75" x2="800" y2="75"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="450"/><line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Decorative orbs -->
  <circle cx="200" cy="120" r="130" fill="url(#glow1)"/>
  <circle cx="600" cy="330" r="110" fill="url(#glow2)"/>

  <!-- Broken perimeter wall (left) -->
  <g transform="translate(180,160)" opacity="0.5">
    <rect x="-60" y="-50" width="120" height="100" rx="6" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="8,4"/>
    <!-- Crack in wall -->
    <path d="M60-20 L68-10 L56 5 L65 20" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <!-- X mark -->
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
    <text x="0" y="70" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ef4444" opacity="0.6">Perimeter</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(280,175)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
    <polygon points="60,-4 70,0 60,4" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- Central shield with zero trust concept -->
  <g transform="translate(420,165)">
    <!-- Shield body -->
    <path d="M0-90 L60-65 L60 10 Q60 58 0 90 Q-60 58 -60 10 L-60-65 Z"
          fill="url(#shield-fill)" stroke="#ef4444" stroke-width="2"/>
    <!-- Inner ring -->
    <circle cx="0" cy="-5" r="32" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
    <!-- Zero / Prohibition sign -->
    <circle cx="0" cy="-5" r="20" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.85"/>
    <line x1="-14" y1="9" x2="14" y2="-19" stroke="#ef4444" stroke-width="2.5" opacity="0.85"/>
    <!-- Checkpoints around shield -->
    <g opacity="0.6">
      <circle cx="-45" cy="-30" r="4" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <path d="M-47-30 L-45-28 L-42-32" fill="none" stroke="#10b981" stroke-width="1.2"/>
    </g>
    <g opacity="0.6">
      <circle cx="45" cy="-30" r="4" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <path d="M43-30 L45-28 L48-32" fill="none" stroke="#10b981" stroke-width="1.2"/>
    </g>
    <g opacity="0.6">
      <circle cx="-45" cy="20" r="4" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <path d="M-47 20 L-45 22 L-42 18" fill="none" stroke="#10b981" stroke-width="1.2"/>
    </g>
    <g opacity="0.6">
      <circle cx="45" cy="20" r="4" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <path d="M43 20 L45 22 L48 18" fill="none" stroke="#10b981" stroke-width="1.2"/>
    </g>
    <!-- Verify label -->
    <text x="0" y="35" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#ef4444" opacity="0.7" letter-spacing="0.15em">VERIFY</text>
  </g>

  <!-- Floating nodes (representing devices/users being verified) -->
  <circle cx="560" cy="110" r="3" fill="#10b981" opacity="0.5"/>
  <circle cx="600" cy="160" r="2.5" fill="#ef4444" opacity="0.4"/>
  <circle cx="650" cy="130" r="2" fill="#a855f7" opacity="0.35"/>
  <circle cx="280" cy="260" r="2.5" fill="#10b981" opacity="0.4"/>
  <circle cx="550" cy="240" r="3" fill="#ef4444" opacity="0.3"/>
  <circle cx="320" cy="110" r="2" fill="#a855f7" opacity="0.4"/>

  <!-- Connection lines -->
  <line x1="560" y1="110" x2="480" y2="130" stroke="#10b981" stroke-width="0.5" opacity="0.15"/>
  <line x1="600" y1="160" x2="480" y2="165" stroke="#ef4444" stroke-width="0.5" opacity="0.15"/>
  <line x1="280" y1="260" x2="360" y2="210" stroke="#10b981" stroke-width="0.5" opacity="0.15"/>

  <!-- Title text -->
  <text x="400" y="340" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#ffffff" opacity="0.92">Zero Trust Guide</text>
  <text x="400" y="370" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0a0b0" opacity="0.6">Never Trust, Always Verify</text>
</svg>
