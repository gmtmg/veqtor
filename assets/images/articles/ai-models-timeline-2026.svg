<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#10101e"/>
    </linearGradient>
  </defs>

  <rect width="760" height="300" rx="12" fill="url(#tbg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="75" x2="760" y2="75"/><line x1="0" y1="150" x2="760" y2="150"/>
    <line x1="0" y1="225" x2="760" y2="225"/>
    <line x1="152" y1="0" x2="152" y2="300"/><line x1="304" y1="0" x2="304" y2="300"/>
    <line x1="456" y1="0" x2="456" y2="300"/><line x1="608" y1="0" x2="608" y2="300"/>
  </g>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ff3cac" opacity="0.9" letter-spacing="0.1em">2026 MODEL RELEASE TIMELINE</text>

  <!-- Timeline axis -->
  <line x1="60" y1="155" x2="700" y2="155" stroke="#2a2a40" stroke-width="2"/>

  <!-- Month labels -->
  <text x="145" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#6b6b80">1月</text>
  <text x="295" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ff3cac" opacity="0.8">2月</text>
  <text x="500" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ff3cac" opacity="0.8">3月</text>
  <text x="660" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#6b6b80">4��</text>

  <!-- Month dividers -->
  <line x1="220" y1="145" x2="220" y2="165" stroke="#2a2a40" stroke-width="1.5"/>
  <line x1="400" y1="145" x2="400" y2="165" stroke="#2a2a40" stroke-width="1.5"/>
  <line x1="600" y1="145" x2="600" y2="165" stroke="#2a2a40" stroke-width="1.5"/>

  <!-- Hot zone highlight -->
  <rect x="240" y="145" width="310" height="20" rx="4" fill="#ff3cac" opacity="0.06"/>

  <!-- Event dots + labels (above timeline) -->
  <!-- Feb 5: Claude Opus 4.6 -->
  <g>
    <circle cx="252" cy="155" r="5" fill="#a855f7"/>
    <line x1="252" y1="150" x2="252" y2="100" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
