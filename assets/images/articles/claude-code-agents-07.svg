<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0e0e1c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" rx="12" fill="url(#bg7)"/>
  <text x="400" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Claude Code = What? / Agent = What?</text>
  <!-- Claude Code box -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="340" height="230" rx="12" fill="#00d4ff" fill-opacity="0.03" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="170" y="35" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="800" fill="#00d4ff">Claude Code</text>
    <text x="170" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#6b6b80">AI-powered coding assistant on Terminal</text>
    <line x1="20" y1="75" x2="320" y2="75" stroke="#1e1e30" stroke-width="1"/>
    <!-- Features -->
    <g font-family="Inter, sans-serif" font-size="12">
      <text x="30" y="102" fill="#c8c8d0">Terminal (command line) on which it runs</text>
      <text x="30" y="128" fill="#c8c8d0">You talk to it in natural language</text>
      <text x="30" y="154" fill="#c8c8d0">It reads/writes code for you</text>
      <text x="30" y="180" fill="#c8c8d0">Runs commands, searches files</text>
      <text x="30" y="206" fill="#c8c8d0">Like a pair programmer in your terminal</text>
    </g>
    <text x="25" y="102" fill="#00d4ff">&#x25B8;</text>
    <text x="25" y="128" fill="#00d4ff">&#x25B8;</text>
    <text x="25" y="154" fill="#00d4ff">&#x25B8;</text>
    <text x="25" y="180" fill="#00d4ff">&#x25B8;</text>
    <text x="25" y="206" fill="#00d4ff">&#x25B8;</text>
  </g>
  <!-- Arrow -->
  <g transform="translate(390, 160)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#6b6b80" stroke-width="2"/>
    <polygon points="30,-5 40,0 30,5" fill="#6b6b80"/>
    <text x="20" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#6b6b80">delegates</text>
  </g>
  <!-- Agent box -->
  <g transform="translate(440, 60)">
    <rect x="0" y="0" width="320" height="230" rx="12" fill="#7c3aed" fill-opacity="0.03" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="160" y="35" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="800" fill="#7c3aed">Agent</text>
    <text x="160" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#6b6b80">Specialist assistant within Claude Code</text>
    <line x1="20" y1="75" x2="300" y2="75" stroke="#1e1e30" stroke-width="1"/>
    <g font-family="Inter, sans-serif" font-size="12">
      <text x="30" y="102" fill="#c8c8d0">A simple text file (.md)</text>
      <text x="30" y="128" fill="#c8c8d0">Focused on one specific task</text>
      <text x="30" y="154" fill="#c8c8d0">Has its own instructions</text>
      <text x="30" y="180" fill="#c8c8d0">Limited tools (safe by design)</text>
      <text x="30" y="206" fill="#c8c8d0">Like hiring a specialist</text>
    </g>
    <text x="25" y="102" fill="#7c3aed">&#x25B8;</text>
    <text x="25" y="128" fill="#7c3aed">&#x25B8;</text>
    <text x="25" y="154" fill="#7c3aed">&#x25B8;</text>
    <text x="25" y="180" fill="#7c3aed">&#x25B8;</text>
    <text x="25" y="206" fill="#7c3aed">&#x25B8;</text>
  </g>
</svg>
