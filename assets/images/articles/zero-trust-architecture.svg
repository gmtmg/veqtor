<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#10101e"/>
    </linearGradient>
  </defs>

  <rect width="760" height="400" rx="12" fill="url(#abg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="760" y2="100"/><line x1="0" y1="200" x2="760" y2="200"/>
    <line x1="0" y1="300" x2="760" y2="300"/>
    <line x1="190" y1="0" x2="190" y2="400"/><line x1="380" y1="0" x2="380" y2="400"/>
    <line x1="570" y1="0" x2="570" y2="400"/>
  </g>

  <!-- Divider -->
  <line x1="380" y1="50" x2="380" y2="370" stroke="#2a2a40" stroke-width="1"/>

  <!-- ===== LEFT: Perimeter Model ===== -->
  <text x="190" y="38" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ef4444" opacity="0.9" letter-spacing="0.08em">PERIMETER MODEL</text>
  <text x="190" y="56" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b6b80" opacity="0.7">境界型セキュリティ</text>

  <!-- Outer wall -->
  <rect x="60" y="80" width="260" height="220" rx="10" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="10,5" opacity="0.5"/>
  <text x="65" y="96" font-family="sans-serif" font-size="8" fill="#ef4444" opacity="0.5">FIREWALL</text>

  <!-- Trusted zone label -->
  <rect x="100" y="110" width="180" height="24" rx="12" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="0.8" opacity="0.5"/>
  <text x="190" y="126" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ef4444" opacity="0.6">社内 = 信頼済み</text>

  <!-- Internal devices (freely connected) -->
  <g transform="translate(120,175)">
    <rect x="-18" y="-14" width="36" height="28" rx="5" fill="#1a1a2e" stroke="#6b6b80" stroke-width="1"/>
    <rect x="-12" y="-8" width="24" height="16" rx="2" fill="none" stroke="#6b6b80" stroke-width="0.8" opacity="0.5"/>
    <text x="0" y="28" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a0a0b0" opacity="0.6">PC</text>
  </g>
  <g transform="translate(190,175)">
    <rect x="-12" y="-16" width="24" height="32" rx="4" fill="#1a1a2e" stroke="#6b6b80" stroke-width="1"/>
    <text x="0" y="28" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a0a0b0" opacity="0.6">Phone</text>
  </g>
  <g transform="translate(260,175)">
    <rect x="-18" y="-12" width="36" height="24" rx="4" fill="#1a1a2e" stroke="#6b6b80" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#6b6b80" opacity="0.4"/>
    <text x="0" y="28" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a0a0b0" opacity="0.6">Server</text>
  </g>

  <!-- Free connections (no checks) -->
  <line x1="138" y1="175" x2="178" y2="175" stroke="#6b6b80" stroke-width="1" opacity="0.3"/>
  <line x1="202" y1="175" x2="242" y2="175" stroke="#6b6b80" stroke-width="1" opacity="0.3"/>

  <!-- Attacker who got past the wall -->
  <g transform="translate(190,240)">
    <circle cx="0" cy="-6" r="8" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="0" y1="2" x2="0" y2="18" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="-10" y1="8" x2="10" y2="8" stroke="#ef4444" stroke-width="1.5"/>
    <text x="0" y="32" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#ef4444" opacity="0.8">侵入者が自由に移動</text>
  </g>

  <!-- Danger arrows -->
  <path d="M175 240 L135 200" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <path d="M205 240 L245 200" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- Bottom verdict -->
  <rect x="90" y="318" width="200" height="26" rx="13" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="0.8" opacity="0.5"/>
  <text x="190" y="336" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#ef4444" opacity="0.7">侵入されたら無防備</text>

  <!-- ===== RIGHT: Zero Trust Model ===== -->
  <text x="570" y="38" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#10b981" opacity="0.9" letter-spacing="0.08em">ZERO TRUST MODEL</text>
  <text x="570" y="56" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b6b80" opacity="0.7">ゼロトラストセキュリティ</text>

  <!-- No single wall — each resource protected -->
  <!-- Device 1 with shield -->
  <g transform="translate(470,155)">
    <rect x="-28" y="-24" width="56" height="48" rx="8" fill="#141425" stroke="#10b981" stroke-width="1.5"/>
    <rect x="-18" y="-14" width="36" height="28" rx="5" fill="#1a1a2e" stroke="#10b981" stroke-width="0.8" opacity="0.6"/>
    <rect x="-12" y="-8" width="24" height="16" rx="2" fill="none" stroke="#10b981" stroke-width="0.8" opacity="0.4"/>
    <!-- Check mark -->
    <g transform="translate(20,-16)">
      <circle cx="0" cy="0" r="6" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1"/>
      <path d="M-3 0 L-1 2 L3-2" fill="none" stroke="#10b981" stroke-width="1.2"/>
    </g>
    <text x="0" y="38" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a0a0b0" opacity="0.6">PC</text>
  </g>

  <!-- Device 2 with shield -->
  <g transform="translate(570,155)">
    <rect x="-28" y="-24" width="56" height="48" rx="8" fill="#141425" stroke="#10b981" stroke-width="1.5"/>
    <rect x="-12" y="-16" width="24" height="32" rx="4" fill="#1a1a2e" stroke="#10b981" stroke-width="0.8" opacity="0.6"/>
    <!-- Check mark -->
    <g transform="translate(20,-16)">
      <circle cx="0" cy="0" r="6" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1"/>
      <path d="M-3 0 L-1 2 L3-2" fill="none" stroke="#10b981" stroke-width="1.2"/>
    </g>
    <text x="0" y="38" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a0a0b0" opacity="0.6">Phone</text>
  </g>

  <!-- Server with shield -->
  <g transform="translate(670,155)">
    <rect x="-28" y="-24" width="56" height="48" rx="8" fill="#141425" stroke="#10b981" stroke-width="1.5"/>
    <rect x="-18" y="-12" width="36" height="24" rx="4" fill="#1a1a2e" stroke="#10b981" stroke-width="0.8" opacity="0.6"/>
    <circle cx="0" cy="0" r="3" fill="#10b981" opacity="0.3"/>
    <!-- Check mark -->
    <g transform="translate(20,-16)">
      <circle cx="0" cy="0" r="6" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1"/>
      <path d="M-3 0 L-1 2 L3-2" fill="none" stroke="#10b981" stroke-width="1.2"/>
    </g>
    <text x="0" y="38" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a0a0b0" opacity="0.6">Server</text>
  </g>

  <!-- Verify arrows between devices -->
  <g transform="translate(508,155)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#10b981" stroke-width="1" opacity="0.4"/>
    <text x="12" y="-6" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#10b981" opacity="0.5">検証</text>
  </g>
  <g transform="translate(608,155)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#10b981" stroke-width="1" opacity="0.4"/>
    <text x="12" y="-6" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#10b981" opacity="0.5">検証</text>
  </g>

  <!-- Verification steps list -->
  <g transform="translate(570,225)">
    <rect x="-130" y="-12" width="260" height="90" rx="8" fill="#141425" stroke="#1e1e30" stroke-width="1"/>
    <text x="-110" y="8" font-family="sans-serif" font-size="9.5" fill="#10b981" opacity="0.8">&#x2714; ID認証（誰がアクセス？）</text>
    <text x="-110" y="24" font-family="sans-serif" font-size="9.5" fill="#10b981" opacity="0.8">&#x2714; デバイス検証（安全な端末？）</text>
    <text x="-110" y="40" font-family="sans-serif" font-size="9.5" fill="#10b981" opacity="0.8">&#x2714; 最小権限（必要最低限のみ許可）</text>
    <text x="-110" y="56" font-family="sans-serif" font-size="9.5" fill="#10b981" opacity="0.8">&#x2714; 継続監視（常にモニタリング）</text>
  </g>

  <!-- Bottom verdict -->
  <rect x="470" y="318" width="200" height="26" rx="13" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-width="0.8" opacity="0.5"/>
  <text x="570" y="336" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#10b981" opacity="0.7">すべてのアクセスを常に検証</text>

  <!-- VS label -->
  <g transform="translate(380,195)">
    <circle cx="0" cy="0" r="18" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#6b6b80" opacity="0.8">VS</text>
  </g>

  <!-- Bottom summary -->
  <text x="380" y="384" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b6b80" opacity="0.6">境界型セキュリティ vs ゼロトラストの根本的な違い</text>
</svg>
