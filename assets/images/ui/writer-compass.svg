<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <circle cx="60" cy="60" r="58" fill="#0e0e18" stroke="#1e1e30" stroke-width="1"/>
  <!-- Compass/Direction motif -->
  <circle cx="60" cy="60" r="24" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>
  <circle cx="60" cy="60" r="16" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <!-- Cardinal lines -->
  <line x1="60" y1="30" x2="60" y2="36" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="84" x2="60" y2="90" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="30" y1="60" x2="36" y2="60" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="84" y1="60" x2="90" y2="60" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Compass needle (North) -->
  <polygon points="60,34 55,58 60,54 65,58" fill="#00d4ff" opacity="0.9"/>
  <!-- Compass needle (South) -->
  <polygon points="60,86 55,62 60,66 65,62" fill="#00d4ff" opacity="0.3"/>
  <!-- Center dot -->
  <circle cx="60" cy="60" r="3" fill="#00d4ff"/>
  <!-- Outer glow ring -->
  <circle cx="60" cy="60" r="38" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.15" stroke-dasharray="4 6"/>
</svg>
