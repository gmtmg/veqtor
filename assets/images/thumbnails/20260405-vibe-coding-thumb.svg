<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060b"/>
      <stop offset="100%" stop-color="#0e0e18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ff3cac"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="640" y2="60"/><line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="180" x2="640" y2="180"/><line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="360"/><line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/><line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/><line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="560" y1="0" x2="560" y2="360"/>
  </g>
  <!-- Chat bubble (user) -->
  <rect x="120" y="80" width="220" height="48" rx="24" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <text x="155" y="110" font-family="monospace" font-size="14" fill="#f59e0b" opacity="0.8">いい感じにして</text>
  <!-- Chat bubble (AI response) -->
  <rect x="300" y="150" width="240" height="48" rx="24" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
  <text x="320" y="175" font-family="monospace" font-size="11" fill="#7c3aed" opacity="0.7">function app() { ... }</text>
  <!-- Flowing wave line -->
  <path d="M80 230 Q200 190 320 230 Q440 270 560 230" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <path d="M80 250 Q200 210 320 250 Q440 290 560 250" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>
  <!-- Sparkle dots -->
  <circle cx="230" cy="108" r="2" fill="#f59e0b" opacity="0.6"/>
  <circle cx="420" cy="178" r="2" fill="#7c3aed" opacity="0.5"/>
  <circle cx="320" cy="230" r="3" fill="#ff3cac" opacity="0.4"/>
  <!-- Title text -->
  <text x="320" y="310" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff" opacity="0.9">VIBE CODING</text>
  <text x="320" y="335" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888" opacity="0.6">Revolution or Illusion?</text>
</svg>
