<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060b"/>
      <stop offset="100%" stop-color="#0e0e18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="640" y2="60"/><line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="180" x2="640" y2="180"/><line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="360"/><line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/><line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/><line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="560" y1="0" x2="560" y2="360"/>
  </g>
  <!-- Loop arrow (circular) -->
  <g transform="translate(320,145)">
    <path d="M-50,0 A50,50 0 1,1 -25,43" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.5"/>
    <polygon points="-30,38 -20,48 -32,50" fill="#10b981" opacity="0.6"/>
  </g>
  <!-- Code snippets floating -->
  <rect x="140" y="80" width="180" height="32" rx="6" fill="#141425" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <text x="155" y="101" font-family="monospace" font-size="12" fill="#00d4ff" opacity="0.8">for i in range(5):</text>
  <!-- List representation -->
  <g transform="translate(350,220)">
    <rect x="0" y="0" width="36" height="28" rx="4" fill="#141425" stroke="#10b981" stroke-width="1" opacity="0.6"/>
    <text x="18" y="19" text-anchor="middle" font-family="monospace" font-size="11" fill="#10b981" opacity="0.8">0</text>
    <rect x="42" y="0" width="36" height="28" rx="4" fill="#141425" stroke="#10b981" stroke-width="1" opacity="0.6"/>
    <text x="60" y="19" text-anchor="middle" font-family="monospace" font-size="11" fill="#10b981" opacity="0.8">1</text>
    <rect x="84" y="0" width="36" height="28" rx="4" fill="#141425" stroke="#10b981" stroke-width="1" opacity="0.6"/>
    <text x="102" y="19" text-anchor="middle" font-family="monospace" font-size="11" fill="#10b981" opacity="0.8">2</text>
    <rect x="126" y="0" width="36" height="28" rx="4" fill="#141425" stroke="#10b981" stroke-width="1" opacity="0.6"/>
    <text x="144" y="19" text-anchor="middle" font-family="monospace" font-size="11" fill="#10b981" opacity="0.8">3</text>
    <rect x="168" y="0" width="36" height="28" rx="4" fill="#141425" stroke="#10b981" stroke-width="1" opacity="0.6"/>
    <text x="186" y="19" text-anchor="middle" font-family="monospace" font-size="11" fill="#10b981" opacity="0.8">4</text>
  </g>
  <!-- Python logo hint -->
  <text x="155" y="240" font-family="monospace" font-size="11" fill="#f59e0b" opacity="0.5">print(i)</text>
  <!-- Sparkle dots -->
  <circle cx="250" cy="150" r="2" fill="#00d4ff" opacity="0.5"/>
  <circle cx="430" cy="130" r="2" fill="#10b981" opacity="0.4"/>
  <circle cx="350" cy="260" r="2" fill="#f59e0b" opacity="0.3"/>
  <!-- Title text -->
  <text x="320" y="310" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff" opacity="0.9">PYTHON FOR LOOPS</text>
  <text x="320" y="335" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888" opacity="0.6">for, range, list &#8212; Interactive Tutorial</text>
</svg>
