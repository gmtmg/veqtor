name: Deploy to Xserver

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 最新のコードを受け取る
      uses: actions/checkout@v4

    - name: 2. SSH鍵をセットアップ
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.XSERVER_SSH_KEY }}

    - name: 3. 接続先ホストを登録
      run: ssh-keyscan -p 10022 -H ${{ secrets.XSERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

    - name: 4. エックスサーバーへ配置する
      env:
        USER_NAME: ${{ secrets.XSERVER_USER }}
        HOST_NAME: ${{ secrets.XSERVER_HOST }}
        TARGET_DIR: /home/${{ secrets.XSERVER_USER }}/algoyosuga.com/public_html/veqtor/
      run: |
        rsync -avz -e "ssh -p 10022" \
          --delete \
          --exclude='.git/' \
          --exclude='.github/' \
          --exclude='.gitignore' \
          --exclude='.DS_Store' \
          --exclude='ARTICLE_INDEX.md' \
          --exclude='STYLE_GUIDE.md' \
          --exclude='IMAGE_GUIDE.md' \
          ./ ${USER_NAME}@${HOST_NAME}:${TARGET_DIR}
