<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#10101e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <rect width="760" height="400" rx="12" fill="url(#hbg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="760" y2="100"/><line x1="0" y1="200" x2="760" y2="200"/>
    <line x1="0" y1="300" x2="760" y2="300"/>
    <line x1="190" y1="0" x2="190" y2="400"/><line x1="380" y1="0" x2="380" y2="400"/>
    <line x1="570" y1="0" x2="570" y2="400"/>
  </g>

  <!-- Title -->
  <text x="380" y="38" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#7c3aed" opacity="0.9" letter-spacing="0.1em">PASSKEY AUTHENTICATION FLOW</text>

  <!-- ===== Registration Phase (Top) ===== -->
  <text x="380" y="72" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#a0a0b0" opacity="0.7">Registration (登録)</text>

  <!-- Device -->
  <g transform="translate(115,95)">
    <rect x="-55" y="-20" width="110" height="90" rx="8" fill="#141425" stroke="#7c3aed" stroke-width="1.5"/>
    <!-- Phone screen -->
    <rect x="-40" y="-10" width="80" height="55" rx="4" fill="#1a1a2e"/>
    <!-- Fingerprint icon -->
    <g transform="translate(0,18)" opacity="0.8">
      <circle cx="0" cy="0" r="14" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
      <path d="M-6-4 Q-6-10 0-10 Q6-10 6-4" fill="none" stroke="#a855f7" stroke-width="1.2"/>
      <path d="M-4 0 Q-4-6 0-6 Q4-6 4 0" fill="none" stroke="#a855f7" stroke-width="1.2"/>
      <line x1="0" y1="-2" x2="0" y2="6" stroke="#a855f7" stroke-width="1.2"/>
    </g>
    <text x="0" y="83" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.85">Your Device</text>
    <text x="0" y="98" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#7c3aed" opacity="0.7">秘密鍵を安全に保管</text>
  </g>

  <!-- Arrow 1: Generate key pair -->
  <g transform="translate(195,130)">
    <line x1="0" y1="0" x2="90" y2="0" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
    <polygon points="90,-4 98,0 90,4" fill="#7c3aed" opacity="0.6"/>
    <text x="45" y="-10" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a0a0b0" opacity="0.7">鍵ペア生成</text>
  </g>

  <!-- Key Pair visual -->
  <g transform="translate(340,110)">
    <rect x="-50" y="-20" width="100" height="70" rx="8" fill="#141425" stroke="#1e1e30" stroke-width="1"/>
    <!-- Private key -->
    <g transform="translate(-22,8)">
      <circle cx="0" cy="-6" r="7" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
      <line x1="0" y1="1" x2="0" y2="16" stroke="#7c3aed" stroke-width="1.5"/>
      <line x1="0" y1="10" x2="5" y2="10" stroke="#7c3aed" stroke-width="1.5"/>
    </g>
    <text x="-22" y="32" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#7c3aed" opacity="0.8">秘密鍵</text>
    <!-- Public key -->
    <g transform="translate(22,8)">
      <circle cx="0" cy="-6" r="7" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
      <line x1="0" y1="1" x2="0" y2="16" stroke="#00d4ff" stroke-width="1.5"/>
      <line x1="0" y1="10" x2="5" y2="10" stroke="#00d4ff" stroke-width="1.5"/>
    </g>
    <text x="22" y="32" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#00d4ff" opacity="0.8">公開鍵</text>
  </g>

  <!-- Arrow 2: Send public key -->
  <g transform="translate(415,130)">
    <line x1="0" y1="0" x2="90" y2="0" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
    <polygon points="90,-4 98,0 90,4" fill="#00d4ff" opacity="0.6"/>
    <text x="45" y="-10" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a0a0b0" opacity="0.7">公開鍵を送信</text>
  </g>

  <!-- Server -->
  <g transform="translate(570,95)">
    <rect x="-55" y="-20" width="110" height="90" rx="8" fill="#141425" stroke="#00d4ff" stroke-width="1.5"/>
    <!-- Server rack icon -->
    <g transform="translate(0,15)">
      <rect x="-20" y="-18" width="40" height="14" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.2"/>
      <rect x="-20" y="0" width="40" height="14" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.2"/>
      <circle cx="12" cy="-11" r="2" fill="#00d4ff" opacity="0.6"/>
      <circle cx="12" cy="7" r="2" fill="#00d4ff" opacity="0.6"/>
    </g>
    <text x="0" y="83" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.85">Server</text>
    <text x="0" y="98" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#00d4ff" opacity="0.7">公開鍵のみ保存</text>
  </g>

  <!-- Divider -->
  <line x1="60" y1="220" x2="700" y2="220" stroke="#1e1e30" stroke-width="1"/>

  <!-- ===== Authentication Phase (Bottom) ===== -->
  <text x="380" y="248" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#a0a0b0" opacity="0.7">Authentication (認証)</text>

  <!-- Step 1: Challenge -->
  <g transform="translate(140,275)">
    <rect x="-60" y="-15" width="120" height="50" rx="8" fill="#141425" stroke="#00d4ff" stroke-width="1"/>
    <text x="0" y="3" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d4ff" opacity="0.8">Challenge</text>
    <text x="0" y="17" text-anchor="middle" font-family="monospace" font-size="8" fill="#6b6b80" opacity="0.6">ランダム文字列</text>
    <text x="0" y="50" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#ffffff" opacity="0.7">1. サーバーが送信</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(218,282)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <polygon points="50,-3 56,0 50,3" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- Step 2: Sign -->
  <g transform="translate(340,275)">
    <rect x="-60" y="-15" width="120" height="50" rx="8" fill="#141425" stroke="#7c3aed" stroke-width="1"/>
    <text x="0" y="3" text-anchor="middle" font-family="monospace" font-size="10" fill="#7c3aed" opacity="0.8">Sign</text>
    <text x="0" y="17" text-anchor="middle" font-family="monospace" font-size="8" fill="#6b6b80" opacity="0.6">秘密鍵で署名</text>
    <text x="0" y="50" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#ffffff" opacity="0.7">2. デバイスが署名</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(418,282)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <polygon points="50,-3 56,0 50,3" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- Step 3: Verify -->
  <g transform="translate(540,275)">
    <rect x="-60" y="-15" width="120" height="50" rx="8" fill="#141425" stroke="#10b981" stroke-width="1"/>
    <text x="0" y="3" text-anchor="middle" font-family="monospace" font-size="10" fill="#10b981" opacity="0.8">Verify</text>
    <text x="0" y="17" text-anchor="middle" font-family="monospace" font-size="8" fill="#6b6b80" opacity="0.6">公開鍵で検証</text>
    <text x="0" y="50" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#ffffff" opacity="0.7">3. サーバーが検証</text>
  </g>

  <!-- Key point -->
  <g transform="translate(380,365)">
    <rect x="-160" y="-14" width="320" height="28" rx="14" fill="#7c3aed" fill-opacity="0.1" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#a855f7" opacity="0.9">秘密鍵はデバイスの外に出ない = 盗まれない</text>
  </g>
</svg>
