<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060b"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#ff3cac"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff3cac" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.06">
    <line x1="0" y1="75" x2="800" y2="75" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="225" x2="800" y2="225" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="375" x2="800" y2="375" stroke="#fff" stroke-width="0.5"/>
    <line x1="133" y1="0" x2="133" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="266" y1="0" x2="266" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="533" y1="0" x2="533" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="666" y1="0" x2="666" y2="450" stroke="#fff" stroke-width="0.5"/>
  </g>
  <!-- Orbs -->
  <circle cx="600" cy="120" r="150" fill="url(#glow2)" opacity="0.5"/>
  <circle cx="180" cy="330" r="120" fill="#ff3cac" opacity="0.08"/>
  <!-- Central gear/settings icon -->
  <circle cx="400" cy="200" r="48" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
  <circle cx="400" cy="200" r="18" fill="#7c3aed" opacity="0.9"/>
  <text x="400" y="206" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#ffffff">II</text>
  <!-- Config nodes -->
  <g transform="translate(250, 120)">
    <rect x="0" y="0" width="80" height="36" rx="8" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
    <text x="40" y="22" text-anchor="middle" font-family="monospace" font-size="10" fill="#7c3aed">tools</text>
  </g>
  <g transform="translate(470, 120)">
    <rect x="0" y="0" width="80" height="36" rx="8" fill="none" stroke="#ff3cac" stroke-width="1.5" opacity="0.7"/>
    <text x="40" y="22" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff3cac">model</text>
  </g>
  <g transform="translate(250, 244)">
    <rect x="0" y="0" width="80" height="36" rx="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <text x="40" y="22" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b">scope</text>
  </g>
  <g transform="translate(470, 244)">
    <rect x="0" y="0" width="80" height="36" rx="8" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <text x="40" y="22" text-anchor="middle" font-family="monospace" font-size="10" fill="#10b981">tips</text>
  </g>
  <!-- Connection lines -->
  <line x1="355" y1="185" x2="330" y2="152" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
  <line x1="445" y1="185" x2="470" y2="152" stroke="#ff3cac" stroke-width="1" opacity="0.4"/>
  <line x1="355" y1="218" x2="330" y2="252" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <line x1="445" y1="218" x2="470" y2="252" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  <!-- Title -->
  <text x="400" y="385" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#ffffff">Claude Code Agents</text>
  <text x="400" y="418" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#6b6b80">Advanced techniques &amp; best practices</text>
</svg>
