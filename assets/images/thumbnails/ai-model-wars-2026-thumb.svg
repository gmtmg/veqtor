<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060b"/>
      <stop offset="100%" stop-color="#0e0e18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3cac"/>
      <stop offset="25%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="75%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="640" y2="60"/><line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="180" x2="640" y2="180"/><line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="360"/><line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/><line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/><line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="560" y1="0" x2="560" y2="360"/>
  </g>
  <!-- Battle hexagons representing different AI companies -->
  <g opacity="0.5">
    <!-- OpenAI hex -->
    <polygon points="160,120 190,105 220,120 220,150 190,165 160,150" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <text x="190" y="140" text-anchor="middle" font-family="monospace" font-size="9" fill="#10b981" opacity="0.8">GPT</text>
    <!-- Anthropic hex -->
    <polygon points="280,90 310,75 340,90 340,120 310,135 280,120" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="310" y="110" text-anchor="middle" font-family="monospace" font-size="9" fill="#f59e0b" opacity="0.8">Claude</text>
    <!-- Google hex -->
    <polygon points="400,120 430,105 460,120 460,150 430,165 400,150" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="430" y="140" text-anchor="middle" font-family="monospace" font-size="9" fill="#00d4ff" opacity="0.8">Gemini</text>
    <!-- Meta hex -->
    <polygon points="200,210 230,195 260,210 260,240 230,255 200,240" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="230" y="230" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed" opacity="0.8">Llama</text>
    <!-- xAI hex -->
    <polygon points="360,200 390,185 420,200 420,230 390,245 360,230" fill="none" stroke="#ff3cac" stroke-width="1.5"/>
    <text x="390" y="220" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff3cac" opacity="0.8">Grok</text>
  </g>
  <!-- Connecting battle lines -->
  <g opacity="0.15" stroke="url(#accent)" stroke-width="0.8">
    <line x1="190" y1="140" x2="310" y2="110"/>
    <line x1="310" y1="110" x2="430" y2="140"/>
    <line x1="190" y1="140" x2="230" y2="225"/>
    <line x1="430" y1="140" x2="390" y2="215"/>
    <line x1="230" y1="225" x2="390" y2="215"/>
    <line x1="310" y1="110" x2="230" y2="225"/>
    <line x1="310" y1="110" x2="390" y2="215"/>
  </g>
  <!-- Sparkle dots at intersections -->
  <circle cx="250" cy="125" r="2" fill="#ff3cac" opacity="0.4"/>
  <circle cx="370" cy="125" r="2" fill="#00d4ff" opacity="0.4"/>
  <circle cx="310" cy="170" r="2.5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="310" cy="215" r="2" fill="#7c3aed" opacity="0.4"/>
  <!-- Title text -->
  <text x="320" y="310" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff" opacity="0.9">AI MODEL WARS 2026</text>
  <text x="320" y="335" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888" opacity="0.6">GPT-5 / Claude / Gemini / Llama / Grok</text>
</svg>
