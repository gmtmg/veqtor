<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0e0e1c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" rx="12" fill="url(#bg6)"/>
  <!-- Terminal window -->
  <rect x="60" y="25" width="680" height="290" rx="10" fill="#0e0e18" stroke="#1e1e30" stroke-width="1.5"/>
  <rect x="60" y="25" width="680" height="36" rx="10" fill="#161625"/>
  <rect x="60" y="51" width="680" height="10" fill="#161625"/>
  <circle cx="84" cy="43" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="104" cy="43" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="124" cy="43" r="6" fill="#10b981" opacity="0.8"/>
  <text x="400" y="47" text-anchor="middle" font-family="monospace" font-size="11" fill="#6b6b80">Terminal</text>
  <!-- Commands -->
  <g font-family="monospace" font-size="13">
    <text x="85" y="85" fill="#6b6b80">$</text>
    <text x="100" y="85" fill="#00d4ff"> cd</text>
    <text x="128" y="85" fill="#c8c8d0"> ~/my-project</text>
    <text x="340" y="85" fill="#6b6b80">  # Step 1: Move to project</text>

    <text x="85" y="115" fill="#6b6b80">$</text>
    <text x="100" y="115" fill="#00d4ff"> mkdir</text>
    <text x="155" y="115" fill="#c8c8d0"> -p .claude/agents</text>
    <text x="340" y="115" fill="#6b6b80">  # Step 2: Create folder</text>

    <text x="85" y="145" fill="#6b6b80">$</text>
    <text x="100" y="145" fill="#00d4ff"> touch</text>
    <text x="155" y="145" fill="#c8c8d0"> .claude/agents/code-reviewer.md</text>

    <text x="85" y="185" fill="#6b6b80">$</text>
    <text x="100" y="185" fill="#00d4ff"> open</text>
    <text x="145" y="185" fill="#c8c8d0"> .claude/agents/code-reviewer.md</text>
    <text x="85" y="210" fill="#6b6b80">  </text>
    <text x="85" y="210" fill="#6b6b80">  # Step 3: Open in editor</text>

    <text x="85" y="250" fill="#6b6b80">$</text>
    <text x="100" y="250" fill="#00d4ff"> claude</text>
    <text x="340" y="250" fill="#6b6b80">  # Step 4: Start Claude Code</text>

    <text x="85" y="280" fill="#10b981">Claude Code &gt;</text>
    <text x="200" y="280" fill="#c8c8d0"> コードをレビューして</text>
    <text x="85" y="300" fill="#6b6b80">  # agent auto-detected!</text>
  </g>
</svg>
