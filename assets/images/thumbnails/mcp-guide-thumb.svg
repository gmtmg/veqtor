<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060b"/>
      <stop offset="100%" stop-color="#0e0e18"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="connector" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="640" y2="60"/><line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="180" x2="640" y2="180"/><line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="360"/><line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/><line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/><line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="560" y1="0" x2="560" y2="360"/>
  </g>
  <!-- Central glow -->
  <ellipse cx="320" cy="160" rx="180" ry="100" fill="url(#glow)"/>
  <!-- Left side: AI Model icons -->
  <g opacity="0.6">
    <!-- Claude icon -->
    <rect x="60" y="100" width="44" height="44" rx="10" fill="none" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="82" y="127" text-anchor="middle" font-family="monospace" font-size="8" fill="#f59e0b">Claude</text>
    <!-- ChatGPT icon -->
    <rect x="60" y="165" width="44" height="44" rx="10" fill="none" stroke="#10b981" stroke-width="1.2"/>
    <text x="82" y="192" text-anchor="middle" font-family="monospace" font-size="8" fill="#10b981">GPT</text>
    <!-- Cursor icon -->
    <rect x="60" y="230" width="44" height="44" rx="10" fill="none" stroke="#a855f7" stroke-width="1.2"/>
    <text x="82" y="257" text-anchor="middle" font-family="monospace" font-size="7" fill="#a855f7">Cursor</text>
  </g>
  <!-- Connection lines left to center -->
  <g opacity="0.3" stroke="url(#connector)" stroke-width="1.2">
    <line x1="104" y1="122" x2="260" y2="155"/>
    <line x1="104" y1="187" x2="260" y2="163"/>
    <line x1="104" y1="252" x2="260" y2="172"/>
  </g>
  <!-- Central USB-C connector motif -->
  <g transform="translate(320,163)">
    <!-- Outer rounded rectangle (USB-C shape) -->
    <rect x="-60" y="-28" width="120" height="56" rx="28" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.9"/>
    <!-- Inner contacts -->
    <rect x="-40" y="-14" width="80" height="28" rx="14" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.6"/>
    <!-- Pin dots -->
    <g fill="#3b82f6" opacity="0.7">
      <circle cx="-24" cy="-4" r="2.5"/><circle cx="-12" cy="-4" r="2.5"/>
      <circle cx="0" cy="-4" r="2.5"/><circle cx="12" cy="-4" r="2.5"/>
      <circle cx="24" cy="-4" r="2.5"/>
      <circle cx="-24" cy="6" r="2.5"/><circle cx="-12" cy="6" r="2.5"/>
      <circle cx="0" cy="6" r="2.5"/><circle cx="12" cy="6" r="2.5"/>
      <circle cx="24" cy="6" r="2.5"/>
    </g>
    <!-- Glow ring -->
    <rect x="-65" y="-33" width="130" height="66" rx="33" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.2"/>
  </g>
  <!-- Connection lines center to right -->
  <g opacity="0.3" stroke="url(#connector)" stroke-width="1.2">
    <line x1="380" y1="155" x2="530" y2="108"/>
    <line x1="380" y1="160" x2="530" y2="160"/>
    <line x1="380" y1="165" x2="530" y2="212"/>
    <line x1="380" y1="172" x2="530" y2="260"/>
  </g>
  <!-- Right side: Tool/Server icons -->
  <g opacity="0.6">
    <!-- GitHub -->
    <rect x="530" y="86" width="44" height="44" rx="10" fill="none" stroke="#e5e7eb" stroke-width="1.2"/>
    <text x="552" y="113" text-anchor="middle" font-family="monospace" font-size="7" fill="#e5e7eb">GitHub</text>
    <!-- Slack -->
    <rect x="530" y="138" width="44" height="44" rx="10" fill="none" stroke="#e91e8c" stroke-width="1.2"/>
    <text x="552" y="165" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#e91e8c">Slack</text>
    <!-- Database -->
    <rect x="530" y="190" width="44" height="44" rx="10" fill="none" stroke="#06b6d4" stroke-width="1.2"/>
    <text x="552" y="217" text-anchor="middle" font-family="monospace" font-size="8" fill="#06b6d4">DB</text>
    <!-- Filesystem -->
    <rect x="530" y="242" width="44" height="44" rx="10" fill="none" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="552" y="269" text-anchor="middle" font-family="monospace" font-size="7" fill="#f59e0b">Files</text>
  </g>
  <!-- Sparkle dots -->
  <circle cx="180" cy="148" r="2" fill="#3b82f6" opacity="0.5"/>
  <circle cx="460" cy="148" r="2" fill="#00d4ff" opacity="0.5"/>
  <circle cx="320" cy="100" r="1.5" fill="#3b82f6" opacity="0.3"/>
  <circle cx="200" cy="200" r="1.5" fill="#00d4ff" opacity="0.3"/>
  <circle cx="440" cy="200" r="1.5" fill="#3b82f6" opacity="0.3"/>
  <!-- Title text -->
  <text x="320" y="310" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#ffffff" opacity="0.95" letter-spacing="0.15em">MCP</text>
  <text x="320" y="338" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888" opacity="0.6">Model Context Protocol</text>
</svg>