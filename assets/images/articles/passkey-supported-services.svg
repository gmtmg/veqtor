<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#10101e"/>
    </linearGradient>
  </defs>

  <rect width="760" height="320" rx="12" fill="url(#sbg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="80" x2="760" y2="80"/><line x1="0" y1="160" x2="760" y2="160"/>
    <line x1="0" y1="240" x2="760" y2="240"/>
    <line x1="190" y1="0" x2="190" y2="320"/><line x1="380" y1="0" x2="380" y2="320"/>
    <line x1="570" y1="0" x2="570" y2="320"/>
  </g>

  <!-- Title -->
  <text x="380" y="38" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#10b981" opacity="0.9" letter-spacing="0.1em">PASSKEY-READY SERVICES (2026)</text>

  <!-- Row 1: Big 3 -->
  <g transform="translate(100,80)">
    <!-- Google -->
    <g transform="translate(0,0)">
      <rect x="-45" y="-10" width="90" height="70" rx="8" fill="#141425" stroke="#10b981" stroke-width="1.5"/>
      <text x="0" y="15" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="800" fill="#ffffff" opacity="0.9">G</text>
      <text x="0" y="40" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a0a0b0" opacity="0.7">Google</text>
      <circle cx="34" cy="-2" r="6" fill="#10b981" opacity="0.8"/>
      <text x="34" y="2" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff" font-weight="700">&#10003;</text>
    </g>

    <!-- Apple -->
    <g transform="translate(130,0)">
      <rect x="-45" y="-10" width="90" height="70" rx="8" fill="#141425" stroke="#10b981" stroke-width="1.5"/>
      <text x="0" y="16" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#ffffff" opacity="0.9">&#63743;</text>
      <text x="0" y="40" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a0a0b0" opacity="0.7">Apple</text>
      <circle cx="34" cy="-2" r="6" fill="#10b981" opacity="0.8"/>
      <text x="34" y="2" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff" font-weight="700">&#10003;</text>
    </g>

    <!-- Microsoft -->
    <g transform="translate(260,0)">
      <rect x="-45" y="-10" width="90" height="70" rx="8" fill="#141425" stroke="#10b981" stroke-width="1.5"/>
      <g transform="translate(-8,8)">
        <rect x="0" y="0" width="8" height="8" fill="#f25022" opacity="0.8"/>
        <rect x="10" y="0" width="8" height="8" fill="#7fba00" opacity="0.8"/>
        <rect x="0" y="10" width="8" height="8" fill="#00a4ef" opacity="0.8"/>
        <rect x="10" y="10" width="8" height="8" fill="#ffb900" opacity="0.8"/>
      </g>
      <text x="0" y="40" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a0a0b0" opacity="0.7">Microsoft</text>
      <circle cx="34" cy="-2" r="6" fill="#10b981" opacity="0.8"/>
      <text x="34" y="2" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff" font-weight="700">&#10003;</text>
    </g>

    <!-- GitHub -->
    <g transform="translate(390,0)">
      <rect x="-45" y="-10" width="90" height="70" rx="8" fill="#141425" stroke="#10b981" stroke-width="1.5"/>
      <circle cx="0" cy="10" r="13" fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.85"/>
      <path d="M-5 16 Q-5 22 0 20 Q5 22 5 16" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
      <text x="0" y="40" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a0a0b0" opacity="0.7">GitHub</text>
      <circle cx="34" cy="-2" r="6" fill="#10b981" opacity="0.8"/>
      <text x="34" y="2" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff" font-weight="700">&#10003;</text>
    </g>

    <!-- Amazon -->
    <g transform="translate(520,0)">
      <rect x="-45" y="-10" width="90" height="70" rx="8" fill="#141425" stroke="#10b981" stroke-width="1.5"/>
      <text x="0" y="15" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="800" fill="#ff9900" opacity="0.9">a</text>
      <path d="M-12 18 Q0 26 12 18" fill="none" stroke="#ff9900" stroke-width="2" opacity="0.6"/>
      <text x="0" y="40" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a0a0b0" opacity="0.7">Amazon</text>
      <circle cx="34" cy="-2" r="6" fill="#10b981" opacity="0.8"/>
      <text x="34" y="2" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff" font-weight="700">&#10003;</text>
    </g>
  </g>

  <!-- Row 2: More services + expanding -->
  <g transform="translate(100,180)">
    <g transform="translate(0,0)">
      <rect x="-45" y="-10" width="90" height="56" rx="8" fill="#141425" stroke="#1e1e30" stroke-width="1"/>
      <text x="0" y="13" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.7">PayPal</text>
      <text x="0" y="30" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#10b981" opacity="0.7">対応済み</text>
    </g>
    <g transform="translate(130,0)">
      <rect x="-45" y="-10" width="90" height="56" rx="8" fill="#141425" stroke="#1e1e30" stroke-width="1"/>
      <text x="0" y="13" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.7">Adobe</text>
      <text x="0" y="30" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#10b981" opacity="0.7">対応済み</text>
    </g>
    <g transform="translate(260,0)">
      <rect x="-45" y="-10" width="90" height="56" rx="8" fill="#141425" stroke="#1e1e30" stroke-width="1"/>
      <text x="0" y="13" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.7">Nintendo</text>
      <text x="0" y="30" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#10b981" opacity="0.7">対応済み</text>
    </g>
    <g transform="translate(390,0)">
      <rect x="-45" y="-10" width="90" height="56" rx="8" fill="#141425" stroke="#1e1e30" stroke-width="1"/>
      <text x="0" y="13" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.7">Sony</text>
      <text x="0" y="30" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#10b981" opacity="0.7">対応済み</text>
    </g>
    <g transform="translate(520,0)">
      <rect x="-45" y="-10" width="90" height="56" rx="8" fill="#141425" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#7c3aed" opacity="0.5">...</text>
      <text x="0" y="30" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#7c3aed" opacity="0.6">拡大中</text>
    </g>
  </g>

  <!-- Bottom stats -->
  <g transform="translate(380,280)">
    <text x="0" y="0" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b6b80" opacity="0.7">主要テック企業が共同推進 ― 対応サービスは日々拡大中</text>
  </g>
</svg>
