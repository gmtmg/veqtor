<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060b"/>
      <stop offset="100%" stop-color="#0e0e18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="rein" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="640" y2="60"/><line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="180" x2="640" y2="180"/><line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="360"/><line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/><line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/><line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="560" y1="0" x2="560" y2="360"/>
  </g>
  <!-- Guardrail lines (constraint boundaries) -->
  <path d="M100 60 L100 280" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.3"/>
  <path d="M540 60 L540 280" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.3"/>
  <path d="M100 60 L540 60" stroke="#f59e0b" stroke-width="1" stroke-dasharray="8,4" opacity="0.15"/>
  <path d="M100 280 L540 280" stroke="#f59e0b" stroke-width="1" stroke-dasharray="8,4" opacity="0.15"/>
  <!-- AI Agent (brain/circle) -->
  <g transform="translate(320,160)">
    <!-- Outer glow ring -->
    <circle cx="0" cy="0" r="48" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.25"/>
    <!-- Agent circle -->
    <circle cx="0" cy="0" r="36" fill="#141425" stroke="#7c3aed" stroke-width="1.5" opacity="0.8"/>
    <!-- Brain/neural icon inside -->
    <circle cx="-8" cy="-8" r="6" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.7"/>
    <circle cx="8" cy="-8" r="6" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.7"/>
    <circle cx="0" cy="8" r="6" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.7"/>
    <line x1="-4" y1="-4" x2="-2" y2="4" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>
    <line x1="4" y1="-4" x2="2" y2="4" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>
    <text x="0" y="2" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#7c3aed" opacity="0.6">AI</text>
  </g>
  <!-- Harness reins (curves from control point to agent) -->
  <path d="M140 100 Q200 130 280 155" fill="none" stroke="url(#rein)" stroke-width="2" opacity="0.5"/>
  <path d="M140 220 Q200 195 280 170" fill="none" stroke="url(#rein)" stroke-width="2" opacity="0.5"/>
  <path d="M500 100 Q440 130 360 155" fill="none" stroke="url(#rein)" stroke-width="2" opacity="0.5"/>
  <path d="M500 220 Q440 195 360 170" fill="none" stroke="url(#rein)" stroke-width="2" opacity="0.5"/>
  <!-- Control nodes (context, constraints, entropy) -->
  <circle cx="140" cy="100" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="140" cy="220" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="500" cy="100" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="500" cy="220" r="6" fill="#f59e0b" opacity="0.7"/>
  <!-- Labels for control nodes -->
  <text x="130" y="88" text-anchor="middle" font-family="monospace" font-size="8" fill="#f59e0b" opacity="0.6">CONTEXT</text>
  <text x="130" y="240" text-anchor="middle" font-family="monospace" font-size="8" fill="#f59e0b" opacity="0.6">ENTROPY</text>
  <text x="510" y="88" text-anchor="middle" font-family="monospace" font-size="8" fill="#f59e0b" opacity="0.6">CONSTRAINT</text>
  <text x="510" y="240" text-anchor="middle" font-family="monospace" font-size="8" fill="#f59e0b" opacity="0.6">FEEDBACK</text>
  <!-- Sparkle dots -->
  <circle cx="200" cy="140" r="2" fill="#f59e0b" opacity="0.4"/>
  <circle cx="440" cy="140" r="2" fill="#7c3aed" opacity="0.4"/>
  <circle cx="320" cy="240" r="2" fill="#f59e0b" opacity="0.3"/>
  <!-- Title text -->
  <text x="320" y="310" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff" opacity="0.9">HARNESS ENGINEERING</text>
  <text x="320" y="335" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888" opacity="0.6">Designing Environments for AI Agents</text>
</svg>
