<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#10101e"/>
    </linearGradient>
    <linearGradient id="danger" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <rect width="760" height="340" rx="12" fill="url(#pbg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="85" x2="760" y2="85"/><line x1="0" y1="170" x2="760" y2="170"/>
    <line x1="0" y1="255" x2="760" y2="255"/>
    <line x1="190" y1="0" x2="190" y2="340"/><line x1="380" y1="0" x2="380" y2="340"/>
    <line x1="570" y1="0" x2="570" y2="340"/>
  </g>

  <!-- Title -->
  <text x="380" y="38" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ef4444" opacity="0.9" letter-spacing="0.1em">PASSWORD THREATS</text>

  <!-- Card 1: Phishing -->
  <g transform="translate(52,65)">
    <rect width="150" height="200" rx="10" fill="#141425" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
    <!-- Fish hook icon -->
    <g transform="translate(75,50)">
      <path d="M0-25 L0 10 Q0 25 15 25" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="0" cy="-28" r="5" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-3" y1="-28" x2="3" y2="-28" stroke="#ef4444" stroke-width="2"/>
    </g>
    <text x="75" y="110" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" opacity="0.9">Phishing</text>
    <text x="75" y="132" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#a0a0b0" opacity="0.7">偽サイトに</text>
    <text x="75" y="148" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#a0a0b0" opacity="0.7">パスワードを入力</text>
    <text x="75" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#ef4444" opacity="0.8">被害件数 過去最高</text>
  </g>

  <!-- Card 2: Reuse -->
  <g transform="translate(232,65)">
    <rect width="150" height="200" rx="10" fill="#141425" stroke="#f97316" stroke-width="1" opacity="0.8"/>
    <!-- Chain/repeat icon -->
    <g transform="translate(75,50)">
      <circle cx="-14" cy="0" r="12" fill="none" stroke="#f97316" stroke-width="2"/>
      <circle cx="14" cy="0" r="12" fill="none" stroke="#f97316" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="10" fill="#f97316" opacity="0.8">= =</text>
    </g>
    <text x="75" y="110" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" opacity="0.9">Reuse</text>
    <text x="75" y="132" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#a0a0b0" opacity="0.7">同じパスワードを</text>
    <text x="75" y="148" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#a0a0b0" opacity="0.7">複数サイトで使用</text>
    <text x="75" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#f97316" opacity="0.8">平均100+アカウント</text>
  </g>

  <!-- Card 3: Breach -->
  <g transform="translate(412,65)">
    <rect width="150" height="200" rx="10" fill="#141425" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
    <!-- Database leak icon -->
    <g transform="translate(75,50)">
      <ellipse cx="0" cy="-8" rx="16" ry="8" fill="none" stroke="#f59e0b" stroke-width="2"/>
      <path d="M-16-8 L-16 8 Q-16 16 0 16 Q16 16 16 8 L16-8" fill="none" stroke="#f59e0b" stroke-width="2"/>
      <line x1="-8" y1="2" x2="8" y2="2" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
      <!-- Crack -->
      <path d="M10-14 L14-6 L8 2 L13 10" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    </g>
    <text x="75" y="110" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" opacity="0.9">Data Breach</text>
    <text x="75" y="132" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#a0a0b0" opacity="0.7">サーバーから</text>
    <text x="75" y="148" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#a0a0b0" opacity="0.7">パスワードが漏洩</text>
    <text x="75" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#f59e0b" opacity="0.8">数億件規模の流出</text>
  </g>

  <!-- Card 4: Brute Force -->
  <g transform="translate(592,65)">
    <rect width="150" height="200" rx="10" fill="#141425" stroke="#a855f7" stroke-width="1" opacity="0.8"/>
    <!-- Brute force icon (key attempts) -->
    <g transform="translate(75,50)">
      <rect x="-18" y="-14" width="36" height="28" rx="4" fill="none" stroke="#a855f7" stroke-width="2"/>
      <text x="0" y="3" text-anchor="middle" font-family="monospace" font-size="11" fill="#a855f7" opacity="0.9">****</text>
      <line x1="-10" y1="20" x2="10" y2="20" stroke="#a855f7" stroke-width="1.5" opacity="0.5"/>
    </g>
    <text x="75" y="110" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" opacity="0.9">Brute Force</text>
    <text x="75" y="132" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#a0a0b0" opacity="0.7">総当たりで</text>
    <text x="75" y="148" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#a0a0b0" opacity="0.7">パスワードを解析</text>
    <text x="75" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#a855f7" opacity="0.8">複雑でも限界あり</text>
  </g>

  <!-- Bottom message -->
  <text x="380" y="308" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b6b80" opacity="0.7">パスワードが抱える4つの根本的な脅威</text>
</svg>
