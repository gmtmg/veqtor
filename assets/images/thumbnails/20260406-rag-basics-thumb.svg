<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060b"/>
      <stop offset="100%" stop-color="#0e0e18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="640" y2="60"/><line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="180" x2="640" y2="180"/><line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="360"/><line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/><line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/><line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="560" y1="0" x2="560" y2="360"/>
  </g>
  <!-- Magnifying glass (Search / Retrieve) -->
  <g transform="translate(160,140)" opacity="0.7">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <line x1="20" y1="20" x2="38" y2="38" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Document lines inside lens -->
    <line x1="-12" y1="-8" x2="12" y2="-8" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="-12" y1="0" x2="8" y2="0" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="-12" y1="8" x2="10" y2="8" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Documents stack -->
  <g transform="translate(310,120)" opacity="0.5">
    <rect x="-22" y="-28" width="44" height="56" rx="4" fill="none" stroke="#00d4ff" stroke-width="1.2"/>
    <rect x="-18" y="-32" width="44" height="56" rx="4" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
    <line x1="-12" y1="-16" x2="12" y2="-16" stroke="#00d4ff" stroke-width="0.8"/>
    <line x1="-12" y1="-8" x2="8" y2="-8" stroke="#00d4ff" stroke-width="0.8"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#00d4ff" stroke-width="0.8"/>
    <line x1="-12" y1="8" x2="6" y2="8" stroke="#00d4ff" stroke-width="0.8"/>
  </g>
  <!-- Arrow from search to docs -->
  <g opacity="0.4">
    <line x1="200" y1="145" x2="275" y2="135" stroke="url(#accent)" stroke-width="1.5" stroke-dasharray="5,3"/>
    <polygon points="275,131 283,135 275,139" fill="#00d4ff" opacity="0.6"/>
  </g>
  <!-- Arrow from docs to AI brain -->
  <g opacity="0.4">
    <line x1="345" y1="135" x2="420" y2="145" stroke="url(#accent)" stroke-width="1.5" stroke-dasharray="5,3"/>
    <polygon points="420,141 428,145 420,149" fill="#f59e0b" opacity="0.6"/>
  </g>
  <!-- AI Brain (Generate) -->
  <g transform="translate(480,140)" opacity="0.7">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <!-- Brain neural pattern -->
    <circle cx="-8" cy="-6" r="6" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
    <circle cx="8" cy="-6" r="6" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
    <circle cx="0" cy="8" r="6" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
    <line x1="-4" y1="-2" x2="-2" y2="4" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
    <line x1="4" y1="-2" x2="2" y2="4" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
    <line x1="-2" y1="-6" x2="2" y2="-6" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- Glow orbs -->
  <circle cx="160" cy="140" r="50" fill="#00d4ff" opacity="0.04"/>
  <circle cx="480" cy="140" r="50" fill="#f59e0b" opacity="0.04"/>
  <!-- Sparkle dots -->
  <circle cx="240" cy="110" r="2" fill="#00d4ff" opacity="0.5"/>
  <circle cx="380" cy="160" r="2" fill="#f59e0b" opacity="0.5"/>
  <circle cx="320" cy="90" r="1.5" fill="#ffffff" opacity="0.3"/>
  <!-- Flow labels -->
  <text x="160" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#00d4ff" opacity="0.6">Retrieve</text>
  <text x="310" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a0a0b0" opacity="0.5">Augment</text>
  <text x="480" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f59e0b" opacity="0.6">Generate</text>
  <!-- Title text -->
  <text x="320" y="280" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#ffffff" opacity="0.9">RAG Basics</text>
  <text x="320" y="305" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888" opacity="0.6">Retrieval-Augmented Generation</text>
  <!-- Compass cyan + Prism amber accent line -->
  <line x1="220" y1="330" x2="420" y2="330" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>
</svg>
